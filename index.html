.btn-p{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;box-shadow:0 4px 20px rgba(124,106,255,.35)}
.btn-p:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,106,255,.45)}
.btn-p:active{transform:scale(.97)}
.btn-p:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-s{background:var(--surface);border:1.5px solid var(--border);color:var(--text)}
.btn-s:hover{border-color:var(--primary);color:var(--primary)}
.btn-g{background:transparent;border:1.5px solid var(--border);color:var(--muted)}

.btn-danger{background:rgba(255,82,82,.12);border:1px solid rgba(255,82,82,.3);color:var(--danger)}

// ══════════════════════════════════════════════
// GROQ AI CALL
// ══════════════════════════════════════════════
async function callAI(messages, systemPrompt) {
  const key = ls.get('pb_apikey','');
  if(!key) throw new Error('No API key. Add your Groq key in Profile settings.');
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
    body:JSON.stringify({
      model: GROQ_MODEL,
      max_tokens: 1400,
      messages:[{role:'system',content:systemPrompt},...messages],
    })
  });
  if(!res.ok){ const e=await res.json(); throw new Error(e.error?.message||'AI request failed'); }
  const d = await res.json();
  return d.choices?.[0]?.message?.content || '';
}

  async updatePaymentRequest(id,upd){ await sb.from('sub_requests').update(upd).eq('id',id); },
  async adminActivateSubscription(userId){ const expires=new Date(); expires.setDate(expires.getDate()+30); const {error}=await sb.from('subscriptions').insert({id:crypto.randomUUID(),user_id:userId,activated_at:new Date().toISOString(),expires_at:expires.toISOString()}); if(error) throw error; },
  // Upload screenshot
  async uploadScreenshot(file, userId){
    const ext = file.name.split('.').pop();
    const path = `sub_proofs/${userId}_${Date.now()}.${ext}`;
    const { data, error } = await sb.storage.from('uploads').upload(path, file, {upsert:true});
    if(error) throw error;
    const { data: urlData } = sb.storage.from('uploads').getPublicUrl(path);
    return urlData.publicUrl;
  },
};

// PARTICLES
// ══════════════════════════════════════════════
function Particles({theme}){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current; if(!c) return;
    const ctx=c.getContext('2d');
    let W=c.width=window.innerWidth, H=c.height=window.innerHeight;
    const resize=()=>{W=c.width=window.innerWidth;H=c.height=window.innerHeight};
    window.addEventListener('resize',resize);
    const toRgb=h=>{if(!h||h.length<7)return'99,102,241';const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`${r},${g},${b}`};
    const cols=[theme.primary,theme.sec,theme.accent].filter(Boolean);
    const pts=Array.from({length:50},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.28,vy:-Math.random()*.32-.07,op:Math.random()*.55+.1,life:1,dec:Math.random()*.002+.0007,col:cols[Math.floor(Math.random()*cols.length)]||'#6366f1'}));
    let raf;
    const draw=()=>{
      ctx.clearRect(0,0,W,H);
      pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.dec;if(p.life<=0||p.y<-10){p.x=Math.random()*W;p.y=H+10;p.life=1;p.vx=(Math.random()-.5)*.28;p.vy=-Math.random()*.32-.07;p.col=cols[Math.floor(Math.random()*cols.length)]||'#6366f1';}try{const rgb=toRgb(p.col.slice(0,7));ctx.save();ctx.globalAlpha=p.op*p.life;ctx.fillStyle=`rgba(${rgb},1)`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}catch(e){}});
      raf=requestAnimationFrame(draw);
    };
    draw();
    return()=>{window.removeEventListener('resize',resize);cancelAnimationFrame(raf)};
  },[theme.id]);
  return <canvas ref={ref} id="canvas"/>;
}

function Toasts({toasts}){
  return <>{toasts.map(t=>(

}

// GLOBAL STATE
// ══════════════════════════════════════════════
function useAppState(){
  const [page,setPage]=useState('landing');
  const [themeId,setThemeId]=useState(ls.get('pb_theme','midnight'));
  const [lang,setLang]=useState(ls.get('pb_lang','en'));
  const [sbUser,setSbUser]=useState(null);
  const [profile,setProfileState]=useState(null);
  const [tasks,setTasks]=useState([]);
  const [notes,setNotes]=useState([]);
  const [txns,setTxns]=useState([]);
  const [sessions,setSessions]=useState([]);
  const [tickets,setTickets]=useState([]);
  const [streak,setStreak]=useState(0);
  const [lastStudy,setLastStudy]=useState(null);
  const [pomSettings,setPomSettings]=useState(ls.get('pb_pom',{focus:25,short:5,long:15,until:4}));
  const [fontSize,setFontSize]=useState(ls.get('pb_fontSize','medium'));
  const [toasts,setToasts]=useState([]);
  const [isPremium,setIsPremium]=useState(false);
  const [premiumUntil,setPremiumUntil]=useState(null);
  const [loading,setLoading]=useState(true);
  const [creditName,setCreditName]=useState('Naimur Rahman Salman');

  const theme = THEMES[themeId]||THEMES.midnight;
  const isAdmin = ADMIN_EMAILS.includes(sbUser?.email||'');

  // Apply theme
  useEffect(()=>{
    const th=theme;
    const r=document.documentElement.style;
    ['bg','surface','card','border','primary','text','muted','success','warn','danger','glow'].forEach(k=>{
      if(k==='primary') r.setProperty('--primary',th.primary);
      else if(k==='glow') r.setProperty('--glow',th.glow);
      else r.setProperty(`--${k}`,th[k]);
    });
    r.setProperty('--secondary',th.sec);
    r.setProperty('--accent',th.accent);
    r.setProperty('--primary-light',th.primary);
    document.body.style.background=th.bg;
    ls.set('pb_theme',themeId);
  },[themeId]);

  // Font size
  useEffect(()=>{
    const s={small:'13px',medium:'15px',large:'17px'};
    document.documentElement.style.setProperty('--font',s[fontSize]||'15px');
    ls.set('pb_fontSize',fontSize);
  },[fontSize]);

  // Auth listener
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user) initUser(session.user);
      else setLoading(false);
    });
    const {data:{subscription:authSub}}=sb.auth.onAuthStateChange((_,session)=>{
      if(session?.user) initUser(session.user);
      else { setSbUser(null); setProfileState(null); setLoading(false); navigate('landing'); }
    });
    return()=>authSub.unsubscribe();
  },[]);

  async function initUser(user){
    setSbUser(user);
    try{
      let prof = await DB.getProfile(user.id);
      if(!prof){
        prof = {id:user.id,email:user.email,name:user.email.split('@')[0],grade:'',bio:'',created_at:new Date().toISOString(),is_admin:ADMIN_EMAILS.includes(user.email)};
        await DB.upsertProfile(prof);
      }
      setProfileState(prof);
      // Load data
      const [t,n,tx,se,ti]=await Promise.all([DB.getTasks(user.id),DB.getNotes(user.id),DB.getTxns(user.id),DB.getSessions(user.id),DB.getTickets(user.id)]);
      setTasks(t); setNotes(n); setTxns(tx); setSessions(se); setTickets(ti);
      // Check subscription
      const sub = await DB.getSubscription(user.id);
      if(sub && new Date(sub.expires_at) > new Date()){ setIsPremium(true); setPremiumUntil(sub.expires_at); }
      // Streak — prefer DB value, fallback to localStorage
      const dbStreak = prof.streak || 0;
      const dbLastStudy = prof.last_study || null;
      const lsStreak = ls.get(`pb_streak_${user.id}`,{count:0,last:null});
      // Use whichever is higher (handles offline sessions)
      if(dbStreak >= lsStreak.count){ setStreak(dbStreak); setLastStudy(dbLastStudy); }
      else { setStreak(lsStreak.count); setLastStudy(lsStreak.last); }
      // App config
      try{ const cfg=await DB.getConfig('credit_name'); if(cfg) setCreditName(cfg.value); }catch(e){}
    }catch(e){ console.warn('DB init error',e); }
    setLoading(false);
    navigate('home');
  }

  function toast(msg,type='success'){ const id=Date.now(); setToasts(p=>[...p,{id,msg,type}]); setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),3000); }
  function navigate(p){ setPage(p); window.scrollTo(0,0); }

  // Auth
  async function signUp(email,password,name,grade){
    const {data,error}=await sb.auth.signUp({email,password});
    if(error) throw error;
    if(data.user){
      const prof={id:data.user.id,email,name,grade,bio:'',streak:0,last_study:null,created_at:new Date().toISOString(),is_admin:ADMIN_EMAILS.includes(email)};
      await DB.upsertProfile(prof);
    }
  }
  async function signIn(email,password){
    const {error}=await sb.auth.signInWithPassword({email,password});
    if(error) throw error;
  }
  async function resetPassword(email){
    const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin});
    if(error) throw error;
  }
  async function signOut(){
    await sb.auth.signOut(); setSbUser(null); setProfileState(null); setTasks([]); setNotes([]); setTxns([]); setSessions([]); navigate('landing');
  }

  // Profile
  async function updateProfile(upd){
    const updated={...profile,...upd};
    setProfileState(updated);
    await DB.upsertProfile(updated);
  }

  // Tasks
  async function addTask(task){ const full={...task,user_id:sbUser.id,created_at:new Date().toISOString()}; setTasks(p=>[full,...p]); await DB.addTask(full); }
  async function updateTask(id,upd){ setTasks(p=>p.map(t=>t.id===id?{...t,...upd}:t)); await DB.updateTask(id,upd); }
  async function deleteTask(id){ setTasks(p=>p.filter(t=>t.id!==id)); await DB.deleteTask(id); }

  // Notes
  async function addNote(note){ const full={...note,user_id:sbUser.id,created_at:new Date().toISOString()}; setNotes(p=>[full,...p]); await DB.addNote(full); }
  async function updateNote(id,upd){ setNotes(p=>p.map(n=>n.id===id?{...n,...upd}:n)); await DB.updateNote(id,upd); }
  async function deleteNote(id){ setNotes(p=>p.filter(n=>n.id!==id)); await DB.deleteNote(id); }

  // Transactions
  async function addTxn(txn){ const full={...txn,user_id:sbUser.id,created_at:new Date().toISOString()}; setTxns(p=>[full,...p]); await DB.addTxn(full); }
  async function deleteTxn(id){ setTxns(p=>p.filter(t=>t.id!==id)); await DB.deleteTxn(id); }

  // Sessions
  async function addSession(s){ const full={...s,user_id:sbUser.id,created_at:new Date().toISOString()}; setSessions(p=>[full,...p]); await DB.addSession(full); }

  // Streak — syncs to Supabase so it persists across devices
  async function updateStreak(){
    const today=new Date().toDateString(); const yesterday=new Date(Date.now()-86400000).toDateString();
    if(lastStudy===today) return;
    const ns=lastStudy===yesterday?streak+1:1;
    const todayISO=new Date().toISOString().split('T')[0];
    setStreak(ns); setLastStudy(today);
    ls.set(`pb_streak_${sbUser?.id}`,{count:ns,last:today});
    // Persist to DB (fire and forget)
    try{ await DB.upsertProfile({...profile,streak:ns,last_study:todayISO}); }catch(e){ console.warn('Streak sync failed',e); }
  }

  // Tickets
  async function addTicket(t){ const full={...t,user_id:sbUser.id,created_at:new Date().toISOString()}; setTickets(p=>[full,...p]); await DB.addTicket(full); }
  async function updateTicket(id,upd){ setTickets(p=>p.map(t=>t.id===id?{...t,...upd}:t)); await DB.updateTicket(id,upd); }

  // Plan gate
  function canAddTask(){ return isPremium || tasks.length < LIMITS.tasks; }
  function canAddNote(){ return isPremium || notes.length < LIMITS.notes; }
  function canUseTheme(id){ return isPremium || FREE_THEMES.includes(id); }

  return {
    page,navigate,theme,themeId,setThemeId,lang,setLang,
    sbUser,profile,updateProfile,signUp,signIn,signOut,resetPassword,
    tasks,addTask,updateTask,deleteTask,
    notes,addNote,updateNote,deleteNote,
    txns,addTxn,deleteTxn,sessions,addSession,
    streak,updateStreak,pomSettings,setPomSettings,
    fontSize,setFontSize,toasts,toast,
    isPremium,premiumUntil,
    canAddTask,canAddNote,canUseTheme,
    tickets,addTicket,updateTicket,
    isAdmin,loading,creditName,setCreditName,
  };
}

    ctx.beginPath();ctx.arc(cx,cy,44,0,Math.PI*2);ctx.fillStyle='var(--card)';ctx.fill();ctx.fillStyle='var(--text)';ctx.font='bold 12px DM Sans';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(`৳${expense.toLocaleString()}`,cx,cy);
  },[view,catBreak.length,txns.length]);

  return (

          <div style={{fontWeight:700,fontSize:36,color:'#fff',marginBottom:10}}>৳{balance.toLocaleString()}</div>
          <div style={{display:'flex',gap:18}}>{[{l:'Income',v:income,i:'↑'},{l:'Expense',v:expense,i:'↓'}].map(({l,v,i})=><div key={l}><div style={{fontSize:11,color:'rgba(255,255,255,.55)'}}>{i} {l}</div><div style={{fontWeight:700,color:'#fff',fontSize:14}}>৳{v.toLocaleString()}</div></div>)}</div>
        </div>

      <div className="card" style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>

      <div style={{display:'flex',gap:6,marginBottom:11}}>

function FlipCard({q,a,opts,col}){
  const [flipped,setFlipped]=useState(false), [chosen,setChosen]=useState(null);
  return <div style={{marginBottom:9}}>{opts?(<div className="card"><div style={{fontSize:13,fontWeight:600,marginBottom:9,lineHeight:1.5}}>{q}</div><div style={{display:'flex',flexDirection:'column',gap:5}}>{opts.map((o,i)=><button key={i} onClick={()=>setChosen(i)} style={{padding:'8px 11px',borderRadius:8,textAlign:'left',cursor:'pointer',fontSize:13,border:`1.5px solid ${chosen===i?(o===a?'var(--success)':'var(--danger)'):'var(--border)'}`,background:chosen===i?(o===a?'rgba(16,185,129,.1)':'rgba(239,68,68,.08)'):'var(--surface)',color:'var(--text)',transition:'all .18s'}}>{o}{chosen===i&&(o===a?' ✓':' ✗')}</button>)}</div></div>):(<div className={`flip-card${flipped?' flipped':''}`} style={{height:88}} onClick={()=>setFlipped(!flipped)}><div className="flip-inner" style={{position:'relative'}}><div className="flip-front" style={{background:`${col}18`,border:`1px solid ${col}36`,color:'var(--text)'}}><div><div style={{fontSize:10,color:col,fontWeight:700,marginBottom:3,textTransform:'uppercase',letterSpacing:'.06em'}}>Q</div>{q}</div></div><div className="flip-back" style={{background:'var(--card)',border:`1px solid ${col}50`,color:'var(--text)'}}><div><div style={{fontSize:10,color:'var(--success)',fontWeight:700,marginBottom:3,textTransform:'uppercase',letterSpacing:'.06em'}}>A</div>{a}</div></div></div></div>)}</div>;
}

function NotesPage({state}){
  const {notes,addNote,updateNote,deleteNote,toast,isPremium,canAddNote,navigate}=state;
  const [search,setSearch]=useState(''), [folder,setFolder]=useState('All'), [editing,setEditing]=useState(false), [cur,setCur]=useState(null), [title,setTitle]=useState(''), [content,setContent]=useState(''), [nf,setNf]=useState('Other'), [col,setCol]=useState('#6366f1'), [aiOut,setAiOut]=useState(''), [aiMode,setAiMode]=useState(''), [aiLoading,setAiLoading]=useState(false), [cards,setCards]=useState([]);
  const FOLDERS=['All','Math','Physics','Chemistry','English','Bengali','ICT','Biology','Other'];
  const COLS=['#6366f1','#a855f7','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#3b82f6'];

  async function save(){
    if(!title&&!content) return toast('Note is empty','error');
    const now=new Date().toISOString();
    if(cur){ await updateNote(cur.id,{title,content,folder:nf,color:col,updated_at:now}); toast('Note updated ✓'); }
    else{
      if(!canAddNote()){ toast('Free plan: max 50 notes. Upgrade!','warn'); return navigate('subscription'); }
      await addNote({id:crypto.randomUUID(),title:title||'Untitled',content,folder:nf,color:col,created_at:now,updated_at:now});
      toast('Note saved ✓');
    }
    setEditing(false); setAiOut(''); setCards([]);
  }

  async function doAI(mode){
    if(!isPremium) return toast('AI tools require PRO plan','warn');
    const text=content||title; if(!text) return toast('Write something first','error');
    setAiLoading(true); setAiMode(mode);
    try{
      const sys='You are a helpful study assistant. Return only what is asked.';
      if(mode==='summarize'){ const r=await callAI([{role:'user',content:`Summarize in bullet points:\n${text}`}],sys); setAiOut(r); }
      else if(mode==='improve'){ const r=await callAI([{role:'user',content:`Improve and expand with better structure:\n${text}`}],sys); setContent(r); setAiOut(''); toast('Note improved ✨'); }
      else if(mode==='cards'){ const r=await callAI([{role:'user',content:`Create 5 flashcards. Return ONLY JSON array: [{"q":"...","a":"..."}]\n${text}`}],'Return valid JSON only, no other text.'); const p=JSON.parse(r.replace(/```json|```/g,'').trim()); setCards(p); setAiOut(''); }
      else if(mode==='quiz'){ const r=await callAI([{role:'user',content:`Create 5 MCQs. Return ONLY JSON: [{"q":"...","opts":["A","B","C","D"],"ans":0}]\n${text}`}],'Return valid JSON only.'); const p=JSON.parse(r.replace(/```json|```/g,'').trim()); setCards(p.map(q=>({q:q.q,a:q.opts?.[q.ans]||'',opts:q.opts}))); setAiOut(''); }
    }catch(e){ toast('AI error: '+e.message,'error'); }
    setAiLoading(false); setAiMode('');
  }

  const filtered=notes.filter(n=>(folder==='All'||n.folder===folder)&&(!search||n.title?.toLowerCase().includes(search.toLowerCase())||n.content?.toLowerCase().includes(search.toLowerCase())));

  if(editing) return (
    <div className="page anim-fade">
      <div style={{display:'flex',gap:7,marginBottom:11,alignItems:'center',flexWrap:'wrap'}}>
        <button onClick={()=>{setEditing(false);setAiOut('');setCards([])}} className="btn btn-s" style={{fontSize:12,padding:'7px 12px'}}>← Back</button>
        <div style={{display:'flex',gap:5,flex:1}}>{COLS.map(c=><button key={c} onClick={()=>setCol(c)} style={{width:22,height:22,borderRadius:6,background:c,border:`2.5px solid ${col===c?'#fff':'transparent'}`,cursor:'pointer',boxShadow:col===c?`0 0 0 2px ${c}`:'none'}}/>)}</div>
        <button className="btn btn-p" style={{fontSize:12,padding:'7px 13px'}} onClick={save}>💾 Save</button>
      </div>
      <input className="inp" placeholder="Title..." value={title} onChange={e=>setTitle(e.target.value)} style={{fontSize:17,fontWeight:600,marginBottom:8,borderLeft:`3px solid ${col}`}}/>
      <select className="inp" value={nf} onChange={e=>setNf(e.target.value)} style={{marginBottom:8,fontSize:13}}>{FOLDERS.filter(f=>f!=='All').map(f=><option key={f}>{f}</option>)}</select>
      <textarea className="inp" placeholder="Write here..." value={content} onChange={e=>setContent(e.target.value)} style={{minHeight:170,resize:'vertical',lineHeight:1.8,marginBottom:11,fontFamily:'inherit'}}/>
      <div style={{marginBottom:7}}>
        <div className="label" style={{marginBottom:7}}>AI Tools {!isPremium&&<span style={{color:'var(--warn)',fontWeight:600,fontSize:10}}>· PRO only</span>}</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {[{m:'summarize',l:'📋 Summarize'},{m:'improve',l:'✨ Improve'},{m:'cards',l:'🃏 Flashcards'},{m:'quiz',l:'❓ Quiz'}].map(({m,l})=>(
            <button key={m} onClick={()=>doAI(m)} disabled={aiLoading} className="chip" style={{borderColor:'rgba(168,85,247,.38)',background:aiMode===m?'rgba(168,85,247,.22)':'rgba(168,85,247,.07)',color:'#c084fc',fontSize:11}}>
              {aiLoading&&aiMode===m?<span style={{animation:'spin .8s linear infinite',display:'inline-block'}}>⟳</span>:l}
            </button>
          ))}

      <div className="card" style={{background:'rgba(99,102,241,.06)',border:'1px solid rgba(99,102,241,.2)'}}>

          <div><div style={{fontWeight:600,fontSize:13}}>Groq API Key</div><div style={{fontSize:11,color:'var(--muted)'}}>Required for AI features</div></div>

        <div style={{position:'relative',marginBottom:8}}>

function SupportPage({state}){
  const {sbUser,profile,tickets,addTicket,toast,isPremium}=state;
  const [msg,setMsg]=useState(''), [cat,setCat]=useState('General Issue');
  const CATS=['General Issue','Bug Report','Feature Request','Subscription','Account Issue','Other'];
  const userTickets=tickets.filter(t=>t.user_id===sbUser?.id);

  async function submit(){
    if(!msg.trim()) return toast('Write a message','error');
    await addTicket({id:crypto.randomUUID(),user_name:profile?.name||'',user_email:sbUser?.email||'',category:cat,message:msg,status:'open',reply:'',created_at:new Date().toISOString()});
    setMsg(''); toast('Message sent! Admin will reply within 24 hours.');
  }

  return (
    <div className="page anim-fade">
      <div className="card" style={{background:'linear-gradient(135deg,rgba(99,102,241,.1),rgba(168,85,247,.05))',border:'1px solid rgba(99,102,241,.22)',textAlign:'center',padding:20,marginBottom:18}}>
        <div style={{fontSize:32,marginBottom:8}}>💬</div>
        <div style={{fontWeight:700,fontSize:17,marginBottom:4}}>Support</div>
        <div style={{fontSize:13,color:'var(--muted)'}}>We typically respond within 24 hours.{isPremium&&' You have priority support as a PRO member.'}</div>
      </div>
      <div className="card" style={{marginBottom:18}}>
        <div style={{fontWeight:600,fontSize:14,marginBottom:13}}>✉ New Message</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div><label className="label">Category</label><select className="inp" value={cat} onChange={e=>setCat(e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div><label className="label">Message *</label><textarea className="inp" rows={4} placeholder="Describe your issue..." value={msg} onChange={e=>setMsg(e.target.value)} style={{resize:'none'}}/></div>
          <button className="btn btn-p" style={{width:'100%',padding:'12px'}} onClick={submit}>↑ Send Message</button>
        </div>
      </div>
      {userTickets.length>0&&(
        <div>
          <div className="sec-head">Your Tickets</div>
          {userTickets.map((t,i)=>(
            <div key={t.id} className="card" style={{marginBottom:9,animation:'slide-up .3s ease-out',animationDelay:`${i*.04}s`,animationFillMode:'both'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7}}>
                <span className="tag tag-p" style={{fontSize:10}}>{t.category}</span>
                <span style={{fontSize:10,fontWeight:600,padding:'2px 7px',borderRadius:99,background:t.status==='resolved'?'rgba(16,185,129,.12)':'rgba(245,158,11,.12)',color:t.status==='resolved'?'var(--success)':'var(--warn)'}}>
                  {t.status==='resolved'?'✓ Resolved':'⧖ Pending'}
                </span>
              </div>
              <div style={{fontSize:13,lineHeight:1.6,marginBottom:5}}>{t.message}</div>
              {t.reply&&<div style={{background:'rgba(99,102,241,.07)',border:'1px solid rgba(99,102,241,.18)',borderRadius:8,padding:'8px 11px',marginTop:7}}><div style={{fontSize:11,fontWeight:600,color:'var(--primary)',marginBottom:2}}>🛡 Admin reply</div><div style={{fontSize:13,lineHeight:1.6}}>{t.reply}</div></div>}
              <div style={{fontSize:10,color:'var(--muted)',marginTop:7}}>{t.created_at?.split('T')[0]}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ADMIN PANEL
// ══════════════════════════════════════════════
function AdminPage({state}){
  const {isAdmin,navigate,toast,creditName,setCreditName,sbUser}=state;
  const [tab,setTab]=useState('payments');
  const [tickets,setTickets]=useState([]);
  const [users,setUsers]=useState([]);
  const [subReqs,setSubReqs]=useState([]);
  const [reply,setReply]=useState('');
  const [selId,setSelId]=useState(null);
  const [editCredit,setEditCredit]=useState(creditName);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    if(!isAdmin){ navigate('home'); return; }
    loadAll();
  },[]);

  async function loadAll(){
    setLoading(true);
    try{
      const [t,u,s]=await Promise.all([DB.getAllTickets(),DB.getAllUsers(),DB.getPaymentRequests()]);
      setTickets(t); setUsers(u); setSubReqs(s);
    }catch(e){ toast('Load error: '+e.message,'error'); }
    setLoading(false);
  }

  async function doReply(id){
    if(!reply.trim()) return toast('Write a reply','error');
    await DB.updateTicket(id,{reply,status:'resolved'});
    setReply(''); setSelId(null); toast('Reply sent ✓'); loadAll();
  }

  async function saveCredit(){
    await DB.setConfig('credit_name',editCredit);
    setCreditName(editCredit); toast('Updated ✓');
  }

  async function approvePayment(req){
    try{
      await DB.adminActivateSubscription(req.user_id);
      await DB.updatePaymentRequest(req.id,{status:'approved'});
      toast('✅ PRO activated for '+(req.user_name||req.user_email)); loadAll();
    }catch(e){ toast('Error: '+e.message,'error'); }
  }

  async function rejectPayment(req){
    if(!window.confirm('Reject this payment?')) return;
    await DB.updatePaymentRequest(req.id,{status:'rejected'});
    toast('Rejected'); loadAll();
  }

  if(!isAdmin) return (
    <div className="page" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'60vh',flexDirection:'column',gap:12}}>
      <div style={{fontSize:48}}>🛡️</div>
      <div style={{fontWeight:800,fontSize:18}}>Access Restricted</div>
      <button className="btn btn-p" onClick={()=>navigate('home')}>Go Home</button>
    </div>
  );

  const pending=subReqs.filter(r=>r.status==='pending').length;

  return (
    <div className="page anim-fade">
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <div style={{width:44,height:44,background:'linear-gradient(135deg,var(--primary),var(--secondary))',borderRadius:13,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🛡️</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:16}}>Admin Panel</div>
          <div style={{fontSize:11,color:'var(--muted)'}}>Porte Boshi Management</div>
        </div>
        <button onClick={loadAll} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'8px 12px',color:'var(--primary)',cursor:'pointer',fontSize:12,fontWeight:700}}>↻ Refresh</button>
      </div>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:9,marginBottom:18}}>
        {[
          {l:'Users',v:users.length,c:'var(--primary)'},
          {l:'Tickets',v:tickets.filter(t=>t.status!=='resolved').length,c:'var(--accent)'},
          {l:'Pending',v:pending,c:pending>0?'var(--warn)':'var(--muted)',hl:pending>0},
        ].map(({l,v,c,hl})=>(
          <div key={l} className="card" style={{textAlign:'center',padding:'13px 6px',borderColor:hl?'rgba(255,171,64,.3)':'var(--border)'}}>
            <div style={{fontWeight:800,fontSize:22,color:c,marginBottom:2}}>{v}</div>
            <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>{l}</div>
          </div>
        ))}
      </div>

      {loading&&<div style={{textAlign:'center',padding:'40px 0',color:'var(--muted)'}}>Loading...</div>}

      {/* Tabs */}
      <div style={{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:3}}>
        {[['payments','💳 Payments'],['tickets','🎫 Tickets'],['users','👥 Users'],['config','⚙️ Config']].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} className="chip" style={{borderColor:tab===v?'var(--primary)':'var(--border)',background:tab===v?'rgba(124,106,255,.15)':'transparent',color:tab===v?'var(--primary-light)':'var(--muted)',flexShrink:0}}>
            {l}{v==='payments'&&pending>0&&<span style={{marginLeft:5,background:'var(--warn)',color:'#000',borderRadius:99,padding:'1px 6px',fontSize:10,fontWeight:800}}>{pending}</span>}
          </button>
        ))}
      </div>

      {/* PAYMENTS TAB */}
      {tab==='payments'&&!loading&&(
        <div>
          {subReqs.length===0&&(
            <div style={{textAlign:'center',padding:'52px 0',color:'var(--muted)'}}>
              <div style={{fontSize:40,marginBottom:12}}>💳</div>
              <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>No payment requests yet</div>
              <div style={{fontSize:12}}>When users submit bKash screenshots, they'll appear here.</div>
            </div>
          )}
          {subReqs.map((r,i)=>{
            const isPending=r.status==='pending';
            const isApproved=r.status==='approved';
            return (
              <div key={r.id} className="card" style={{marginBottom:14,borderLeft:`3px solid ${isApproved?'var(--success)':r.status==='rejected'?'var(--danger)':'var(--warn)'}`,animation:'slide-up .35s cubic-bezier(.22,1,.36,1)',animationDelay:`${i*.05}s`,animationFillMode:'both'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:11,position:'relative',zIndex:1}}>
                  <div>
                    <div style={{fontWeight:800,fontSize:15,marginBottom:2}}>{r.user_name||'—'}</div>
                    <div style={{fontSize:12,color:'var(--muted)'}}>{r.user_email}</div>
                    <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>Submitted {r.created_at?.split('T')[0]}</div>
                  </div>
                  <span style={{fontSize:10,fontWeight:700,padding:'4px 11px',borderRadius:99,flexShrink:0,background:isApproved?'rgba(0,230,118,.12)':r.status==='rejected'?'rgba(255,82,82,.12)':'rgba(255,171,64,.12)',color:isApproved?'var(--success)':r.status==='rejected'?'var(--danger)':'var(--warn)',border:`1px solid ${isApproved?'rgba(0,230,118,.28)':r.status==='rejected'?'rgba(255,82,82,.25)':'rgba(255,171,64,.28)'}`}}>
                    {isApproved?'✓ Approved':r.status==='rejected'?'✕ Rejected':'⧖ Pending'}
                  </span>
                </div>
                {r.screenshot_url&&(
                  <div style={{marginBottom:12,position:'relative',zIndex:1}}>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--muted)',marginBottom:7,textTransform:'uppercase',letterSpacing:'.07em'}}>Payment Screenshot</div>
                    <img src={r.screenshot_url} alt="Payment proof" style={{width:'100%',borderRadius:12,border:'1px solid var(--border)',maxHeight:280,objectFit:'cover',cursor:'pointer'}} onClick={()=>window.open(r.screenshot_url,'_blank')}/>
                    <div style={{fontSize:10,color:'var(--muted)',marginTop:4,textAlign:'center'}}>Tap to open full size</div>
                  </div>
                )}
                {isPending&&(
                  <div style={{display:'flex',gap:9,position:'relative',zIndex:1}}>
                    <button className="btn btn-p" style={{flex:1,padding:'12px'}} onClick={()=>approvePayment(r)}>✓ Approve — 30 days PRO</button>
                    <button className="btn btn-danger" style={{padding:'12px 16px',borderRadius:12}} onClick={()=>rejectPayment(r)}>✕</button>
                  </div>
                )}
                {isApproved&&<div style={{fontSize:12,color:'var(--success)',fontWeight:700,display:'flex',alignItems:'center',gap:7,position:'relative',zIndex:1}}>⭐ PRO activated — 30 days from {r.created_at?.split('T')[0]}</div>}
                {r.status==='rejected'&&<div style={{fontSize:12,color:'var(--danger)',fontWeight:600,position:'relative',zIndex:1}}>✕ Payment rejected</div>}
              </div>
            );
          })}
        </div>
      )}

      {/* TICKETS TAB */}
      {tab==='tickets'&&!loading&&(
        <div>
          {tickets.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:'var(--muted)'}}>No tickets yet 📭</div>}
          {tickets.map((t,i)=>(
            <div key={t.id} className="card" style={{marginBottom:10,borderLeft:`3px solid ${t.status==='resolved'?'var(--success)':'var(--warn)'}`,animation:'slide-up .35s cubic-bezier(.22,1,.36,1)',animationDelay:`${i*.05}s`,animationFillMode:'both'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:9,position:'relative',zIndex:1}}>
                <div>
                  <div style={{fontWeight:700,fontSize:13}}>{t.user_name||t.user_email}</div>
                  <div style={{fontSize:11,color:'var(--muted)'}}>{t.user_email} · {t.created_at?.split('T')[0]}</div>
                </div>
                <span style={{fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:99,background:t.status==='resolved'?'rgba(0,230,118,.12)':'rgba(255,171,64,.12)',color:t.status==='resolved'?'var(--success)':'var(--warn)',flexShrink:0}}>{t.status==='resolved'?'✓ Done':'⧖ Open'}</span>
              </div>
              <div style={{fontSize:11,color:'var(--primary-light)',fontWeight:700,marginBottom:5,position:'relative',zIndex:1}}>{t.category}</div>
              <div style={{fontSize:13,lineHeight:1.65,marginBottom:9,position:'relative',zIndex:1}}>{t.message}</div>
              {t.reply&&<div style={{background:'rgba(0,230,118,.07)',border:'1px solid rgba(0,230,118,.18)',borderRadius:10,padding:'9px 12px',marginBottom:8,position:'relative',zIndex:1}}><div style={{fontSize:10,fontWeight:700,color:'var(--success)',marginBottom:2}}>Your reply:</div><div style={{fontSize:13}}>{t.reply}</div></div>}
              {selId===t.id?(
                <div style={{position:'relative',zIndex:1}}>
                  <textarea className="inp" rows={3} placeholder="Write reply..." value={reply} onChange={e=>setReply(e.target.value)} style={{marginBottom:8,resize:'none'}}/>
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn btn-p" style={{flex:1,fontSize:12,padding:'9px'}} onClick={()=>doReply(t.id)}>↑ Send Reply</button>
                    <button className="btn btn-g" style={{fontSize:12,padding:'9px'}} onClick={()=>setSelId(null)}>Cancel</button>
                  </div>
                </div>
              ):(
                <button onClick={()=>{setSelId(t.id);setReply(t.reply||'');}} style={{padding:'7px 13px',background:'rgba(124,106,255,.1)',border:'1px solid rgba(124,106,255,.22)',borderRadius:9,color:'var(--primary-light)',fontSize:11,fontWeight:700,cursor:'pointer',position:'relative',zIndex:1}}>
                  ✏ {t.reply?'Edit Reply':'Reply'}
                </button>
              )}
            </div>
          ))}
        </div>
      )}

      {/* USERS TAB */}
      {tab==='users'&&!loading&&(
        <div>
          {users.map((u,i)=>(
            <div key={u.id} className="card" style={{marginBottom:9,animation:'slide-up .35s cubic-bezier(.22,1,.36,1)',animationDelay:`${i*.04}s`,animationFillMode:'both'}}>
              <div style={{display:'flex',alignItems:'center',gap:12,position:'relative',zIndex:1}}>
                <div style={{width:40,height:40,borderRadius:12,background:'linear-gradient(135deg,var(--primary),var(--secondary))',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:16,color:'#fff',flexShrink:0}}>{(u.name||'?')[0].toUpperCase()}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,display:'flex',alignItems:'center',gap:7}}>
                    {u.name||'—'}
                    {u.is_admin&&<span style={{fontSize:9,background:'rgba(124,106,255,.2)',color:'var(--primary-light)',padding:'2px 7px',borderRadius:99,fontWeight:800}}>ADMIN</span>}
                  </div>
                  <div style={{fontSize:11,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.email}</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  {u.grade&&<div style={{fontSize:11,color:'var(--primary-light)',marginBottom:2,fontWeight:600}}>{u.grade}</div>}
                  <div style={{fontSize:10,color:'var(--muted)'}}>{u.created_at?.split('T')[0]}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* CONFIG TAB */}
      {tab==='config'&&(
        <div>
          <div className="card" style={{marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:12,position:'relative',zIndex:1}}>✍️ Developer Credit</div>
            <div style={{display:'flex',gap:8,position:'relative',zIndex:1}}>
              <input className="inp" value={editCredit} onChange={e=>setEditCredit(e.target.value)} placeholder="Developer name"/>
              <button className="btn btn-p" style={{whiteSpace:'nowrap'}} onClick={saveCredit}>Save</button>
            </div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:8,position:'relative',zIndex:1}}>Shown in the About page as the app creator.</div>
          </div>
          <div className="card">
            <div style={{fontWeight:700,fontSize:13,marginBottom:10,position:'relative',zIndex:1}}>🔑 Admin Access</div>
            <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.75,position:'relative',zIndex:1}}>Admin access is controlled by <code style={{background:'var(--bg)',padding:'2px 6px',borderRadius:5,fontFamily:'var(--ff-mono)',fontSize:12}}>is_admin = true</code> in the Supabase profiles table. No password needed — your account is automatically recognized.</div>
          </div>
        </div>
      )}
    </div>
  );
}
function App(){
  const state=useAppState();
  const {page,navigate,theme,sbUser,loading,toast:showToast,toasts,isAdmin}=state;

  if(loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',flexDirection:'column',gap:12}}>
      <div style={{width:44,height:44,background:'linear-gradient(135deg,var(--primary),var(--secondary))',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,boxShadow:'0 0 24px var(--glow)'}}>✦</div>
      <div style={{animation:'spin .8s linear infinite',width:22,height:22,border:'2px solid var(--border)',borderTopColor:'var(--primary)',borderRadius:'50%'}}/>
    </div>
  );

  const authPages=['landing','auth'];
  if(authPages.includes(page)||!sbUser){
    return (
      <>
        <Particles theme={theme}/>
        {page==='auth'||sbUser===null&&page!=='landing'?<AuthPage state={state}/>:<LandingPage navigate={navigate}/>}
        <Toasts toasts={toasts}/>
      </>
    );
  }

  const PAGE_MAP={
    home:<HomePage state={state}/>,
    planner:<PlannerPage state={state}/>,
    pomodoro:<PomodoroPage state={state}/>,
    money:<MoneyPage state={state}/>,
    notes:<NotesPage state={state}/>,
    aitutor:<AiTutorPage state={state}/>,
    themes:<ThemesPage state={state}/>,
    profile:<ProfilePage state={state}/>,
    settings:<SettingsPage state={state}/>,
    support:<SupportPage state={state}/>,
    about:<AboutPage state={state}/>,
    admin:<AdminPage state={state}/>,
    subscription:<SubscriptionPage state={state}/>,
  };

  return (
    <>
      <Particles theme={theme}/>
      <div style={{maxWidth:480,margin:'0 auto',position:'relative'}}>
        <TopBar state={state}/>
        <div key={page} style={{animation:'fade-in .25s ease-out'}}>
          {PAGE_MAP[page]||<HomePage state={state}/>}
        </div>
        <BottomNav page={page} navigate={state.navigate}/>
      </div>
      <Toasts toasts={toasts}/>
    </>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
