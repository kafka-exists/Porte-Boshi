<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{
  --bg:#0e0e0e;--surface:#161616;--card:#1e1e1e;--border:#2a2a2a;
  --primary:#e8472a;--primary-light:#ff6649;--secondary:#c93a20;
  --accent:#f5c842;--text:#f0ede8;--muted:#6b6760;
  --success:#4caf7d;--warn:#f5c842;--danger:#e8472a;
  --glow:rgba(232,71,42,.18);--r:10px;
  --ff:'Outfit',sans-serif;--ff-serif:'Cormorant Garamond',serif;
  --ff-bn:'Hind Siliguri',sans-serif;--ff-mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--ff);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:var(--border)}
::selection{background:var(--primary);color:#fff}
input,select,textarea,button{font-family:inherit;font-size:inherit}

/* ── Layout ── */
.page{max-width:480px;margin:0 auto;padding:68px 16px 96px;min-height:100vh;position:relative;z-index:1}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}

/* ── Inputs ── */
.inp{width:100%;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--primary)}
.inp::placeholder{color:var(--muted)}
select.inp option{background:var(--surface)}
textarea.inp{resize:vertical;line-height:1.7}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:8px;font-weight:600;font-size:13px;border:none;transition:all .15s;cursor:pointer;white-space:nowrap;letter-spacing:.01em}
.btn-p{background:var(--primary);color:#fff;font-weight:700}
.btn-p:hover:not(:disabled){background:var(--primary-light);transform:translateY(-1px)}
.btn-p:active{transform:scale(.97)}
.btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-s{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-s:hover{border-color:var(--primary);color:var(--primary)}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-g:hover{color:var(--text);border-color:var(--muted)}
.btn-danger{background:rgba(232,71,42,.1);border:1px solid rgba(232,71,42,.26);color:var(--danger)}

/* ── Labels ── */
.label{display:block;font-size:10px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.1em}
.sec-head{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-bottom:10px}
.divider{height:1px;background:var(--border);margin:16px 0}

/* ── Tags ── */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--muted);letter-spacing:.04em}
.tag-p{background:rgba(232,71,42,.1);border-color:rgba(232,71,42,.24);color:var(--primary-light)}
.tag-s{background:rgba(76,175,125,.1);border-color:rgba(76,175,125,.24);color:var(--success)}
.tag-w{background:rgba(245,200,66,.1);border-color:rgba(245,200,66,.24);color:var(--warn)}
.tag-d{background:rgba(232,71,42,.1);border-color:rgba(232,71,42,.24);color:var(--danger)}
.chip{display:inline-flex;align-items:center;padding:6px 13px;border-radius:5px;font-size:12px;font-weight:600;border:1px solid;cursor:pointer;transition:all .14s;user-select:none;white-space:nowrap}
.chip:active{transform:scale(.95)}

/* ── Badges ── */
.pro-badge{display:inline-flex;align-items:center;background:var(--primary);color:#fff;font-size:9px;font-weight:800;padding:3px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.1em}
.free-badge{display:inline-flex;align-items:center;background:var(--surface);color:var(--muted);font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;border:1px solid var(--border)}
.streak-badge{display:flex;align-items:center;gap:4px;background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.22);border-radius:5px;padding:4px 9px}

/* ── Stats ── */
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;overflow:hidden}

/* ── Check ── */
.check-box{width:21px;height:21px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;border:1.5px solid var(--border);background:transparent;cursor:pointer}
.check-box.done{background:var(--primary);border-color:var(--primary)}

/* ── Progress ── */
.progress-bar{height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width 1.1s cubic-bezier(.22,1,.36,1)}

/* ── Animations ── */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes fire{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slide-up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes scale-in{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes bounce-in{0%{opacity:0;transform:scale(.65) translateX(-50%)}65%{transform:scale(1.03) translateX(-50%)}100%{opacity:1;transform:scale(1) translateX(-50%)}}
@keyframes slide-left{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.anim-float{animation:float 4s ease-in-out infinite}
.anim-fire{animation:fire .5s ease-in-out infinite}
.anim-spin{animation:spin 1s linear infinite}
.anim-slide{animation:slide-up .38s cubic-bezier(.22,1,.36,1)}
.anim-fade{animation:fade-in .3s ease-out}
.anim-scale{animation:scale-in .28s cubic-bezier(.22,1,.36,1)}

/* ── Background ── */
#canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.07}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(232,71,42,.04) 0%,transparent 70%);pointer-events:none;z-index:0}

/* ── Top bar ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:50;max-width:480px;margin:0 auto;background:rgba(14,14,14,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between}
.topbar-logo{width:32px;height:32px;background:var(--primary);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:700;font-size:18px;color:#fff;cursor:pointer;transition:transform .15s;flex-shrink:0}
.topbar-logo:active{transform:scale(.88)}

/* ── Bottom nav ── */
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:50;max-width:480px;margin:0 auto;background:rgba(14,14,14,.97);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-top:1px solid var(--border);padding:6px 0 10px;display:flex;align-items:center;justify-content:space-around}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 9px;border:none;background:transparent;cursor:pointer;transition:all .15s;min-width:44px;border-radius:7px}
.nav-item.active{background:rgba(232,71,42,.1)}
.nav-label{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:color .15s}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.88);backdrop-filter:blur(14px);display:flex;align-items:flex-end;justify-content:center}
.modal{width:100%;max-width:480px;background:var(--surface);border-top-left-radius:16px;border-top-right-radius:16px;padding:20px;border:1px solid var(--border);border-bottom:none;max-height:92vh;overflow-y:auto;animation:slide-up .32s cubic-bezier(.22,1,.36,1)}
.modal-handle{width:34px;height:3px;background:var(--border);border-radius:99px;margin:0 auto 18px}

/* ── Toast ── */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:999;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:9px 16px;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;animation:bounce-in .35s cubic-bezier(.22,1,.36,1);box-shadow:0 10px 36px rgba(0,0,0,.7);display:flex;align-items:center;gap:7px}

/* ── AI messages ── */
.msg-user{background:var(--primary);color:#fff;border-radius:16px 16px 3px 16px;padding:10px 14px;font-size:14px;line-height:1.65}
.msg-ai{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:16px 16px 16px 3px;padding:10px 14px;font-size:14px;line-height:1.65}

/* ── Flip cards ── */
.flip-card{perspective:1000px;cursor:pointer}
.flip-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .48s cubic-bezier(.4,0,.2,1)}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:14px;text-align:center;font-size:13px;line-height:1.65}
.flip-back{transform:rotateY(180deg)}

/* ── Theme cards ── */
.theme-card{border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;border:2px solid transparent}
.theme-card.active{border-color:var(--primary);box-shadow:0 0 18px var(--glow)}

/* ── Misc ── */
input[type=range]{accent-color:var(--primary);width:100%}
.lock-overlay{position:absolute;inset:0;background:rgba(14,14,14,.84);backdrop-filter:blur(4px);border-radius:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;z-index:10}
@media(max-width:380px){.page{padding:64px 13px 92px}}
@media(min-width:768px){.bottomnav{display:none}.page{padding-bottom:28px}}
</style>

// ══════════════════════════════════════════════
// GROQ AI CALL
// ══════════════════════════════════════════════
async function callAI(messages, systemPrompt) {
  const key = ls.get('pb_apikey','');
  if(!key) throw new Error('No API key. Add your Groq key in Profile settings.');
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
    body:JSON.stringify({
      model: GROQ_MODEL,
      max_tokens: 1400,
      messages:[{role:'system',content:systemPrompt},...messages],
    })
  });
  if(!res.ok){ const e=await res.json(); throw new Error(e.error?.message||'AI request failed'); }
  const d = await res.json();
  return d.choices?.[0]?.message?.content || '';
}

  async getSubscription(userId){ const {data}=await sb.from('subscriptions').select('*').eq('user_id',userId).order('expires_at',{ascending:false}).limit(1).single(); return data; },
  // All users (admin)
  async getAllUsers(){ const {data}=await sb.from('profiles').select('*').order('created_at',{ascending:false}); return data||[]; },
  // App config
  async getConfig(key){ const {data}=await sb.from('app_config').select('*').eq('key',key).single(); return data; },
  async setConfig(key,value){ await sb.from('app_config').upsert({key,value,updated_at:new Date().toISOString()}); },
  // Payment requests
  async addPaymentRequest(r){ await sb.from('sub_requests').insert(r); },
  async getPaymentRequests(){ const {data}=await sb.from('sub_requests').select('*').order('created_at',{ascending:false}); return data||[]; },
  async updatePaymentRequest(id,upd){ await sb.from('sub_requests').update(upd).eq('id',id); },
  async adminActivateSubscription(userId){ const expires=new Date(); expires.setDate(expires.getDate()+30); const {error}=await sb.from('subscriptions').insert({id:crypto.randomUUID(),user_id:userId,activated_at:new Date().toISOString(),expires_at:expires.toISOString()}); if(error) throw error; },
  // Upload screenshot
  async uploadScreenshot(file, userId){
    const ext = file.name.split('.').pop();
    const path = `sub_proofs/${userId}_${Date.now()}.${ext}`;
    const { data, error } = await sb.storage.from('uploads').upload(path, file, {upsert:true});
    if(error) throw error;
    const { data: urlData } = sb.storage.from('uploads').getPublicUrl(path);
    return urlData.publicUrl;
  },
};

// PARTICLES
// ══════════════════════════════════════════════
function Particles({theme}){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current; if(!c) return;
    const ctx=c.getContext('2d');
    let W=c.width=window.innerWidth, H=c.height=window.innerHeight;
    const resize=()=>{W=c.width=window.innerWidth;H=c.height=window.innerHeight};
    window.addEventListener('resize',resize);
    const toRgb=h=>{if(!h||h.length<7)return'99,102,241';const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`${r},${g},${b}`};
    const cols=[theme.primary,theme.sec,theme.accent].filter(Boolean);
    const pts=Array.from({length:50},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.28,vy:-Math.random()*.32-.07,op:Math.random()*.55+.1,life:1,dec:Math.random()*.002+.0007,col:cols[Math.floor(Math.random()*cols.length)]||'#6366f1'}));
    let raf;
    const draw=()=>{
      ctx.clearRect(0,0,W,H);
      pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.dec;if(p.life<=0||p.y<-10){p.x=Math.random()*W;p.y=H+10;p.life=1;p.vx=(Math.random()-.5)*.28;p.vy=-Math.random()*.32-.07;p.col=cols[Math.floor(Math.random()*cols.length)]||'#6366f1';}try{const rgb=toRgb(p.col.slice(0,7));ctx.save();ctx.globalAlpha=p.op*p.life;ctx.fillStyle=`rgba(${rgb},1)`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}catch(e){}});
      raf=requestAnimationFrame(draw);
    };
    draw();
    return()=>{window.removeEventListener('resize',resize);cancelAnimationFrame(raf)};
  },[theme.id]);
  return <canvas ref={ref} id="canvas"/>;
}

// TOAST
// ══════════════════════════════════════════════
function Toasts({toasts}){
  return <>{toasts.map(t=>(
    <div key={t.id} className="toast" style={{borderLeft:`3px solid ${t.type==='error'?'var(--danger)':t.type==='warn'?'var(--warn)':'var(--success)'}`}}>
      <span style={{fontSize:14}}>{t.type==='error'?'✕':t.type==='warn'?'⚠':'✓'}</span>{t.msg}
    </div>
  ))}</>;
}

// GLOBAL STATE
// ══════════════════════════════════════════════
function useAppState(){
  const [page,setPage]=useState('landing');
  const [themeId,setThemeId]=useState(ls.get('pb_theme','midnight'));
  const [lang,setLang]=useState(ls.get('pb_lang','en'));
  const [sbUser,setSbUser]=useState(null);
  const [profile,setProfileState]=useState(null);
  const [tasks,setTasks]=useState([]);
  const [notes,setNotes]=useState([]);
  const [txns,setTxns]=useState([]);
  const [sessions,setSessions]=useState([]);
  const [tickets,setTickets]=useState([]);
  const [streak,setStreak]=useState(0);
  const [lastStudy,setLastStudy]=useState(null);
  const [pomSettings,setPomSettings]=useState(ls.get('pb_pom',{focus:25,short:5,long:15,until:4}));
  const [fontSize,setFontSize]=useState(ls.get('pb_fontSize','medium'));
  const [toasts,setToasts]=useState([]);
  const [isPremium,setIsPremium]=useState(false);
  const [premiumUntil,setPremiumUntil]=useState(null);
  const [loading,setLoading]=useState(true);
  const [creditName,setCreditName]=useState('Naimur Rahman Salman');

  const theme = THEMES[themeId]||THEMES.midnight;
  // isAdmin reads from profiles.is_admin in Supabase — secured by RLS
  const isAdmin = profile?.is_admin === true;

  // Apply theme
  useEffect(()=>{
    const th=theme;
    const r=document.documentElement.style;
    ['bg','surface','card','border','primary','text','muted','success','warn','danger','glow'].forEach(k=>{
      if(k==='primary') r.setProperty('--primary',th.primary);
      else if(k==='glow') r.setProperty('--glow',th.glow);
      else r.setProperty(`--${k}`,th[k]);
    });
    r.setProperty('--secondary',th.sec);
    r.setProperty('--accent',th.accent);
    r.setProperty('--primary-light',th.primary);
    document.body.style.background=th.bg;
    ls.set('pb_theme',themeId);
  },[themeId]);

  // Font size
  useEffect(()=>{
    const s={small:'13px',medium:'15px',large:'17px'};
    document.documentElement.style.setProperty('--font',s[fontSize]||'15px');
    ls.set('pb_fontSize',fontSize);
  },[fontSize]);

  // Auth listener
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user) initUser(session.user);
      else setLoading(false);
    });
    const {data:{subscription:authSub}}=sb.auth.onAuthStateChange((_,session)=>{
      if(session?.user) initUser(session.user);
      else { setSbUser(null); setProfileState(null); setLoading(false); navigate('landing'); }
    });
    return()=>authSub.unsubscribe();
  },[]);

  async function initUser(user){
    setSbUser(user);
    try{
      let prof = await DB.getProfile(user.id);
      if(!prof){
        prof = {id:user.id,email:user.email,name:user.email.split('@')[0],grade:'',bio:'',created_at:new Date().toISOString(),is_admin:false};
        await DB.upsertProfile(prof);
      }
      setProfileState(prof);
      // Load data
      const [t,n,tx,se,ti]=await Promise.all([DB.getTasks(user.id),DB.getNotes(user.id),DB.getTxns(user.id),DB.getSessions(user.id),DB.getTickets(user.id)]);
      setTasks(t); setNotes(n); setTxns(tx); setSessions(se); setTickets(ti);
      // Check subscription
      const sub = await DB.getSubscription(user.id);
      if(sub && new Date(sub.expires_at) > new Date()){ setIsPremium(true); setPremiumUntil(sub.expires_at); }
      // Streak — prefer DB value, fallback to localStorage
      const dbStreak = prof.streak || 0;
      const dbLastStudy = prof.last_study || null;
      const lsStreak = ls.get(`pb_streak_${user.id}`,{count:0,last:null});
      // Use whichever is higher (handles offline sessions)
      if(dbStreak >= lsStreak.count){ setStreak(dbStreak); setLastStudy(dbLastStudy); }
      else { setStreak(lsStreak.count); setLastStudy(lsStreak.last); }
      // App config
      try{ const cfg=await DB.getConfig('credit_name'); if(cfg) setCreditName(cfg.value); }catch(e){}
    }catch(e){ console.warn('DB init error',e); }
    setLoading(false);
    navigate('home');
  }

  function toast(msg,type='success'){ const id=Date.now(); setToasts(p=>[...p,{id,msg,type}]); setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),3000); }
  function navigate(p){ setPage(p); window.scrollTo(0,0); }

  // Auth
  async function signUp(username,password,name,grade){
    // Convert username to fake email — no email confirmation needed
    const fakeEmail=username.toLowerCase().replace(/[^a-z0-9]/g,'')+'@porteboshi.app';
    const {data,error}=await sb.auth.signUp({email:fakeEmail,password});
    if(error) throw error;
    if(data.user){
      const prof={id:data.user.id,email:fakeEmail,name:name||username,grade,bio:'',streak:0,last_study:null,created_at:new Date().toISOString(),is_admin:false};
      await DB.upsertProfile(prof); // is_admin set by DB trigger for admin accounts
    }
  }
  async function signIn(username,password){
    // Try as fake email first, then fallback to real email for existing users
    const isEmail=username.includes('@');
    const loginEmail=isEmail?username:username.toLowerCase().replace(/[^a-z0-9]/g,'')+'@porteboshi.app';
    const {error}=await sb.auth.signInWithPassword({email:loginEmail,password});
    if(error) throw error;
  }
  async function resetPassword(email){
    const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin});
    if(error) throw error;
  }
  async function signOut(){
    await sb.auth.signOut(); setSbUser(null); setProfileState(null); setTasks([]); setNotes([]); setTxns([]); setSessions([]); navigate('landing');
  }

  // Profile
  async function updateProfile(upd){
    const updated={...profile,...upd};
    setProfileState(updated);
    await DB.upsertProfile(updated);
  }

  // Tasks
  async function addTask(task){ const full={...task,user_id:sbUser.id,created_at:new Date().toISOString()}; setTasks(p=>[full,...p]); await DB.addTask(full); }
  async function updateTask(id,upd){ setTasks(p=>p.map(t=>t.id===id?{...t,...upd}:t)); await DB.updateTask(id,upd); }
  async function deleteTask(id){ setTasks(p=>p.filter(t=>t.id!==id)); await DB.deleteTask(id); }

  // Notes
  async function addNote(note){ const full={...note,user_id:sbUser.id,created_at:new Date().toISOString()}; setNotes(p=>[full,...p]); await DB.addNote(full); }
  async function updateNote(id,upd){ setNotes(p=>p.map(n=>n.id===id?{...n,...upd}:n)); await DB.updateNote(id,upd); }
  async function deleteNote(id){ setNotes(p=>p.filter(n=>n.id!==id)); await DB.deleteNote(id); }

  // Transactions
  async function addTxn(txn){ const full={...txn,user_id:sbUser.id,created_at:new Date().toISOString()}; setTxns(p=>[full,...p]); await DB.addTxn(full); }
  async function deleteTxn(id){ setTxns(p=>p.filter(t=>t.id!==id)); await DB.deleteTxn(id); }

  // Sessions
  async function addSession(s){ const full={...s,user_id:sbUser.id,created_at:new Date().toISOString()}; setSessions(p=>[full,...p]); await DB.addSession(full); }

  // Streak — syncs to Supabase so it persists across devices
  async function updateStreak(){
    const today=new Date().toDateString(); const yesterday=new Date(Date.now()-86400000).toDateString();
    if(lastStudy===today) return;
    const ns=lastStudy===yesterday?streak+1:1;
    const todayISO=new Date().toISOString().split('T')[0];
    setStreak(ns); setLastStudy(today);
    ls.set(`pb_streak_${sbUser?.id}`,{count:ns,last:today});
    // Persist to DB (fire and forget)
    try{ await DB.upsertProfile({...profile,streak:ns,last_study:todayISO}); }catch(e){ console.warn('Streak sync failed',e); }
  }

  // Tickets
  async function addTicket(t){ const full={...t,user_id:sbUser.id,created_at:new Date().toISOString()}; setTickets(p=>[full,...p]); await DB.addTicket(full); }
  async function updateTicket(id,upd){ setTickets(p=>p.map(t=>t.id===id?{...t,...upd}:t)); await DB.updateTicket(id,upd); }

  // Plan gate
  function canAddTask(){ return isPremium || tasks.length < LIMITS.tasks; }
  function canAddNote(){ return isPremium || notes.length < LIMITS.notes; }
  function canUseTheme(id){ return isPremium || FREE_THEMES.includes(id); }

  return {
    page,navigate,theme,themeId,setThemeId,lang,setLang,
    sbUser,profile,updateProfile,signUp,signIn,signOut,resetPassword,
    tasks,addTask,updateTask,deleteTask,
    notes,addNote,updateNote,deleteNote,
    txns,addTxn,deleteTxn,sessions,addSession,
    streak,updateStreak,pomSettings,setPomSettings,
    fontSize,setFontSize,toasts,toast,
    isPremium,premiumUntil,
    canAddTask,canAddNote,canUseTheme,
    tickets,addTicket,updateTicket,
    isAdmin,loading,creditName,setCreditName,
  };
}

  const [password,setPassword]=useState('');
  const [name,setName]=useState('');

  async function submit(){
    if(!username||!password) return toast('Fill in all fields','error');
    if(username.length<3) return toast('Username must be 3+ characters','error');
    if(password.length<6) return toast('Password must be 6+ characters','error');

      if(!name) return toast('Enter your name','error');
      if(inviteCode.trim().toLowerCase()!==INVITE_CODE) return toast('Wrong invite code','error');
    }
    setLoading(true);
    try{
      if(mode==='register') await signUp(username,password,name,grade);
      else await signIn(username,password);
    }catch(e){
      const msg=e.message||'';
      if(msg.includes('already registered')||msg.includes('already exists')) toast('Username taken — try another','error');
      else if(msg.includes('Invalid login')||msg.includes('invalid')) toast('Wrong username or password','error');
      else toast(msg,'error');
    }

  }

  return (
    <div style={{minHeight:'100vh',background:'#0e0e0e',display:'flex',flexDirection:'column',justifyContent:'center',padding:'32px 20px',maxWidth:480,margin:'0 auto',position:'relative'}}>

function PomodoroPage({state}){
  const {pomSettings,setPomSettings,addSession,updateStreak,toast,sessions}=state;
  const [mode,setMode]=useState('focus');
  const [running,setRunning]=useState(false);
  const [sessDone,setSessDone]=useState(0);
  const [timeLeft,setTimeLeft]=useState(pomSettings.focus*60);
  const [showSet,setShowSet]=useState(false);
  const [tmp,setTmp]=useState({...pomSettings});
  const intv=useRef(null);
  const dur={focus:pomSettings.focus*60,short:pomSettings.short*60,long:pomSettings.long*60};
  const total=dur[mode],pct=((total-timeLeft)/total)*100;
  const modeCol={focus:'var(--primary)',short:'var(--success)',long:'var(--accent)'}[mode];
  const today=new Date().toISOString().split('T')[0];
  const todayS=sessions.filter(s=>s.created_at?.startsWith(today));
  const todayMins=todayS.reduce((a,s)=>a+(s.dur||25),0);
  useEffect(()=>{
    if(running){intv.current=setInterval(()=>setTimeLeft(p=>{if(p<=1){clearInterval(intv.current);setRunning(false);if(mode==='focus'){const nd=sessDone+1;setSessDone(nd);addSession({id:crypto.randomUUID(),dur:pomSettings.focus});updateStreak();if(typeof confetti!=='undefined')confetti({particleCount:55,spread:55,origin:{y:.7}});toast('Session complete! 🎉');const nm=nd%pomSettings.until===0?'long':'short';setMode(nm);return dur[nm];}else{setMode('focus');return dur.focus;}}return p-1;}),1000);}
    else clearInterval(intv.current);
    return()=>clearInterval(intv.current);
  },[running,mode]);
  const mins=String(Math.floor(timeLeft/60)).padStart(2,'0'),secs=String(timeLeft%60).padStart(2,'0');
  const R=96,cx=120,cy=120,circ=2*Math.PI*R;

    <div className="page anim-fade">
      {/* Mode selector */}
      <div style={{display:'flex',gap:6,justifyContent:'center',marginBottom:28}}>
        {[['focus','Focus'],['short','Short Break'],['long','Long Break']].map(([m,l])=>(
          <button key={m} onClick={()=>{setMode(m);setRunning(false);clearInterval(intv.current);setTimeLeft(dur[m]);}} className="chip" style={{borderColor:mode===m?modeCol:'var(--border)',background:mode===m?`rgba(${m==='focus'?'232,71,42':m==='short'?'76,175,125':'245,200,66'},.1)`:'transparent',color:mode===m?modeCol:'var(--muted)',fontSize:11}}>
            {l}
          </button>
        ))}
      </div>

      {/* Timer ring */}
      <div style={{display:'flex',justifyContent:'center',marginBottom:28}}>
        <div style={{position:'relative',width:240,height:240}}>
          <svg width="240" height="240" style={{transform:'rotate(-90deg)'}}>
            <circle cx={cx} cy={cy} r={R} fill="none" stroke="var(--border)" strokeWidth="6"/>
            <circle cx={cx} cy={cy} r={R} fill="none" stroke={modeCol} strokeWidth="6" strokeLinecap="round"
              strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)}
              style={{transition:'stroke-dashoffset .5s ease',filter:`drop-shadow(0 0 8px ${modeCol})`}}/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:44,fontWeight:500,color:'var(--text)',lineHeight:1,letterSpacing:'-.01em'}}>{mins}:{secs}</div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:6,textTransform:'uppercase',letterSpacing:'.1em'}}>{mode==='focus'?'Focus':mode==='short'?'Short Break':'Long Break'}</div>
            <div style={{display:'flex',gap:5,marginTop:10}}>
              {Array.from({length:pomSettings.until},(_,i)=><div key={i} style={{width:7,height:7,borderRadius:'50%',background:i<sessDone%pomSettings.until?modeCol:'var(--border)',transition:'background .3s'}}/>)}
            </div>
          </div>
        </div>
      </div>

      {/* Controls */}
      <div style={{display:'flex',gap:9,justifyContent:'center',marginBottom:24}}>
        <button className="btn btn-p" style={{minWidth:130,padding:'13px 24px',fontSize:14,borderRadius:8}} onClick={()=>setRunning(r=>!r)}>
          {running?'⏸ Pause':sessDone>0?'▶ Resume':'▶ Start'}
        </button>
        <button className="btn btn-s" style={{padding:'13px 14px'}} onClick={()=>{setRunning(false);clearInterval(intv.current);setTimeLeft(dur[mode]);}}>↺</button>
        <button className="btn btn-g" style={{padding:'13px 14px'}} onClick={()=>setShowSet(true)}>⚙</button>
      </div>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}}>
        {[{l:'Sessions',v:todayS.length},{l:'Focus Time',v:`${todayMins}m`},{l:'Streak',v:`${state.streak}d`}].map(({l,v})=>(
          <div key={l} className="card" style={{textAlign:'center',padding:'12px 6px'}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:700,fontSize:18,color:'var(--primary)',marginBottom:2}}>{v}</div>
            <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em'}}>{l}</div>
          </div>
        ))}
      </div>

      {showSet&&(
        <div className="modal-bg" onClick={()=>setShowSet(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:700,fontSize:20,marginBottom:18}}>Timer Settings</div>
            {[{k:'focus',l:'Focus (min)',min:5,max:90},{k:'short',l:'Short Break (min)',min:1,max:15},{k:'long',l:'Long Break (min)',min:5,max:30},{k:'until',l:'Sessions before long break',min:2,max:6}].map(({k,l,min,max})=>(
              <div key={k} style={{marginBottom:16}}>

            <button className="btn btn-p" style={{width:'100%',padding:'12px'}} onClick={()=>{setPomSettings(tmp);ls.set('pb_pom',tmp);setShowSet(false);setTimeLeft(tmp.focus*60);toast('Saved ✓');}}>Save Settings</button>
          </div>
        </div>
      )}
    </div>
  );
}

            ].map(({icon,val,lbl,col,sub},i)=>(
              <div key={lbl} className="stat" style={{borderTop:`2px solid ${col}`,borderRadius:'0 0 9px 9px',animation:'slide-up .35s cubic-bezier(.22,1,.36,1)',animationDelay:`${i*.06}s`,animationFillMode:'both'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <span style={{fontSize:17}}>{icon}</span>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:700,fontSize:24,color:col,lineHeight:1}}>{val}</div>
                </div>
                <div style={{fontWeight:700,fontSize:12,marginBottom:2}}>{lbl}</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>{sub}</div>
              </div>
            ))}
          </div>

          {/* Bar chart */}
          <div className="card" style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,marginBottom:14,color:'var(--text)'}}>📈 Signups — Last 7 Days</div>
            <div style={{display:'flex',alignItems:'flex-end',gap:6,height:72}}>
              {last7.map(({label,count},i)=>(
                <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                  <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,height:12,display:'flex',alignItems:'center'}}>{count||''}</div>
                  <div style={{width:'100%',background:'var(--primary)',borderRadius:'3px 3px 0 0',height:`${Math.max((count/maxBar)*52,count>0?6:2)}px`,transition:'height .6s cubic-bezier(.22,1,.36,1)',transitionDelay:`${i*.05}s`,opacity:count>0?1:.25}}/>
                  <div style={{fontSize:9,color:'var(--muted)'}}>{label}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Recent users */}
          <div className="card" style={{marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,marginBottom:12}}>Recent Users</div>
            {users.slice(0,5).map((u,i)=>(
              <div key={u.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<4?'1px solid var(--border)':'none'}}>
                <div style={{width:32,height:32,borderRadius:7,background:'var(--primary)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14,color:'#fff',flexShrink:0}}>{(u.name||'?')[0].toUpperCase()}</div>
                <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.name||u.email}</div><div style={{fontSize:10,color:'var(--muted)'}}>{u.grade||'—'} · {u.created_at?.split('T')[0]}</div></div>
                {u.is_admin&&<span className="tag tag-p" style={{fontSize:9}}>ADMIN</span>}
              </div>
            ))}
            {users.length===0&&<div style={{fontSize:12,color:'var(--muted)',textAlign:'center',padding:'12px 0'}}>No users yet</div>}
          </div>

          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setTab('payments')} style={{flex:1,padding:'10px',background:pending>0?'rgba(245,200,66,.08)':'var(--surface)',border:`1px solid ${pending>0?'rgba(245,200,66,.26)':'var(--border)'}`,borderRadius:8,color:pending>0?'var(--warn)':'var(--muted)',fontWeight:600,fontSize:12,cursor:'pointer'}}>{pending>0?`💳 ${pending} pending`:'💳 Payments'}</button>
            <button onClick={()=>setTab('tickets')} style={{flex:1,padding:'10px',background:openTickets>0?'rgba(76,175,125,.06)':'var(--surface)',border:`1px solid ${openTickets>0?'rgba(76,175,125,.22)':'var(--border)'}`,borderRadius:8,color:openTickets>0?'var(--success)':'var(--muted)',fontWeight:600,fontSize:12,cursor:'pointer'}}>{openTickets>0?`🎫 ${openTickets} open`:'🎫 Tickets'}</button>
          </div>
        </div>
      )}

      {/* PAYMENTS */}
      {tab==='payments'&&!loading&&(
        <div>
          {subReqs.length===0&&<div style={{textAlign:'center',padding:'48px 0',color:'var(--muted)'}}><div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:18,marginBottom:6}}>No payment requests yet</div></div>}
          {subReqs.map((r,i)=>{
            const isPend=r.status==='pending',isApp=r.status==='approved';
            return (
              <div key={r.id} className="card" style={{marginBottom:12,borderLeft:`3px solid ${isApp?'var(--success)':r.status==='rejected'?'var(--danger)':'var(--warn)'}`,borderRadius:'0 9px 9px 0',animation:'slide-up .32s cubic-bezier(.22,1,.36,1)',animationDelay:`${i*.05}s`,animationFillMode:'both'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                  <div><div style={{fontWeight:700,fontSize:14,marginBottom:1}}>{r.user_name||'—'}</div><div style={{fontSize:11,color:'var(--muted)'}}>{r.user_email?.replace('@porteboshi.app','')}</div><div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>{r.created_at?.split('T')[0]}</div></div>
                  <span className={`tag tag-${isApp?'s':r.status==='rejected'?'d':'w'}`} style={{fontSize:10}}>{isApp?'✓ Approved':r.status==='rejected'?'✕ Rejected':'⧖ Pending'}</span>
                </div>
                {r.screenshot_url&&<div style={{marginBottom:10}}><div style={{fontSize:10,fontWeight:700,color:'var(--muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.08em'}}>Screenshot</div><img src={r.screenshot_url} alt="Payment" style={{width:'100%',borderRadius:8,border:'1px solid var(--border)',maxHeight:240,objectFit:'cover',cursor:'pointer'}} onClick={()=>window.open(r.screenshot_url,'_blank')}/></div>}
                {isPend&&<div style={{display:'flex',gap:8}}><button className="btn btn-p" style={{flex:1,padding:'11px',fontSize:12}} onClick={()=>approvePayment(r)}>✓ Approve — 30 days PRO</button><button className="btn btn-danger" style={{padding:'11px 14px'}} onClick={()=>rejectPayment(r)}>✕</button></div>}
                {isApp&&<div style={{fontSize:12,color:'var(--success)',fontWeight:600}}>⭐ PRO activated — 30 days</div>}
                {r.status==='rejected'&&<div style={{fontSize:12,color:'var(--danger)',fontWeight:600}}>✕ Rejected</div>}
              </div>
            );
          })}
        </div>
      )}

      {/* TICKETS */}
      {tab==='tickets'&&!loading&&(
        <div>
          {tickets.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:'var(--muted)'}}><div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:18}}>No tickets yet</div></div>}
          {tickets.map((t,i)=>(
            <div key={t.id} className="card" style={{marginBottom:9,borderLeft:`3px solid ${t.status==='resolved'?'var(--success)':'var(--warn)'}`,borderRadius:'0 9px 9px 0',animation:'slide-up .3s cubic-bezier(.22,1,.36,1)',animationDelay:`${i*.04}s`,animationFillMode:'both'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7}}>
                <div><div style={{fontWeight:700,fontSize:13}}>{t.user_name||t.user_email?.replace('@porteboshi.app','')}</div><div style={{fontSize:10,color:'var(--muted)'}}>{t.created_at?.split('T')[0]}</div></div>
                <span className={`tag tag-${t.status==='resolved'?'s':'w'}`} style={{fontSize:9,textTransform:'uppercase'}}>{t.status==='resolved'?'Done':'Open'}</span>
              </div>
              <div style={{fontSize:10,fontWeight:700,color:'var(--primary-light)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.08em'}}>{t.category}</div>
              <div style={{fontSize:13,lineHeight:1.7,marginBottom:8}}>{t.message}</div>
              {t.reply&&<div style={{background:'var(--surface)',border:'1px solid var(--border)',borderLeft:'2px solid var(--success)',borderRadius:'0 7px 7px 0',padding:'8px 11px',marginBottom:8}}><div style={{fontSize:9,fontWeight:700,color:'var(--success)',marginBottom:2,textTransform:'uppercase',letterSpacing:'.08em'}}>Your reply:</div><div style={{fontSize:12}}>{t.reply}</div></div>}
              {selId===t.id?(
                <div><textarea className="inp" rows={3} placeholder="Write reply..." value={reply} onChange={e=>setReply(e.target.value)} style={{marginBottom:7,resize:'none',fontSize:13}}/><div style={{display:'flex',gap:7}}><button className="btn btn-p" style={{flex:1,fontSize:12,padding:'8px'}} onClick={()=>doReply(t.id)}>↑ Send Reply</button><button className="btn btn-g" style={{fontSize:12,padding:'8px'}} onClick={()=>setSelId(null)}>Cancel</button></div></div>
              ):<button onClick={()=>{setSelId(t.id);setReply(t.reply||'');}} style={{padding:'6px 12px',background:'rgba(232,71,42,.08)',border:'1px solid rgba(232,71,42,.2)',borderRadius:6,color:'var(--primary-light)',fontSize:11,fontWeight:700,cursor:'pointer'}}>✏ {t.reply?'Edit Reply':'Reply'}</button>}
            </div>
          ))}
        </div>
      )}

      {/* USERS */}
      {tab==='users'&&!loading&&(
        <div>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:12}}>{users.length} users · {proUsers} PRO · {newToday} joined today</div>
          {users.map((u,i)=>(
            <div key={u.id} className="card" style={{marginBottom:8,animation:'slide-up .3s cubic-bezier(.22,1,.36,1)',animationDelay:`${i*.04}s`,animationFillMode:'both'}}>
              <div style={{display:'flex',alignItems:'center',gap:11}}>
                <div style={{width:38,height:38,borderRadius:8,background:'var(--primary)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:16,color:'#fff',flexShrink:0}}>{(u.name||'?')[0].toUpperCase()}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,display:'flex',alignItems:'center',gap:6}}>
                    {u.name||'—'}
                    {u.is_admin&&<span className="tag tag-p" style={{fontSize:9}}>ADMIN</span>}
                  </div>
                  <div style={{fontSize:11,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.email?.replace('@porteboshi.app','')}</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  {u.grade&&<div style={{fontSize:11,color:'var(--primary-light)',marginBottom:1,fontWeight:600}}>{u.grade}</div>}
                  <div style={{fontSize:10,color:'var(--muted)'}}>{u.created_at?.split('T')[0]}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* CONFIG */}
      {tab==='config'&&(
        <div>
          <div className="card" style={{marginBottom:12}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:700,fontSize:18,marginBottom:4}}>🔑 Invite Code</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:12,lineHeight:1.7}}>Users need this code to register. Edit it directly in the source code — find <code style={{background:'var(--surface)',padding:'2px 6px',borderRadius:4,fontSize:11,color:'var(--primary-light)'}}> INVITE_CODE</code>.</div>
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:7,padding:'11px 14px',fontFamily:'var(--ff-mono)',fontSize:14,fontWeight:700,color:'var(--primary-light)',letterSpacing:'.05em'}}>porteboshi2024</div>
          </div>
          <div className="card">
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:700,fontSize:18,marginBottom:12}}>✍️ Developer Credit</div>
            <div style={{display:'flex',gap:8}}>
              <input className="inp" value={editCredit} onChange={e=>setEditCredit(e.target.value)} placeholder="Developer name"/>
              <button className="btn btn-p" onClick={saveCredit} style={{whiteSpace:'nowrap'}}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
function App(){
  const state=useAppState();
  const {page,navigate,theme,sbUser,loading,toast:showToast,toasts,isAdmin}=state;

  if(loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',flexDirection:'column',gap:12}}>
      <div style={{width:44,height:44,background:'linear-gradient(135deg,var(--primary),var(--secondary))',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,boxShadow:'0 0 24px var(--glow)'}}>✦</div>
      <div style={{animation:'spin .8s linear infinite',width:22,height:22,border:'2px solid var(--border)',borderTopColor:'var(--primary)',borderRadius:'50%'}}/>
    </div>
  );

  const authPages=['landing','auth'];
  if(authPages.includes(page)||!sbUser){
    return (
      <>
        <Particles theme={theme}/>
        {page==='auth'||sbUser===null&&page!=='landing'?<AuthPage state={state}/>:<LandingPage navigate={navigate}/>}
        <Toasts toasts={toasts}/>
      </>
    );
  }

  const PAGE_MAP={
    home:<HomePage state={state}/>,
    planner:<PlannerPage state={state}/>,
    pomodoro:<PomodoroPage state={state}/>,
    money:<MoneyPage state={state}/>,
    notes:<NotesPage state={state}/>,
    aitutor:<AiTutorPage state={state}/>,
    themes:<ThemesPage state={state}/>,
    profile:<ProfilePage state={state}/>,
    settings:<SettingsPage state={state}/>,
    support:<SupportPage state={state}/>,
    about:<AboutPage state={state}/>,
    admin:<AdminPage state={state}/>,
    subscription:<SubscriptionPage state={state}/>,
  };

  return (
    <>
      <Particles theme={theme}/>
      <div style={{maxWidth:480,margin:'0 auto',position:'relative'}}>
        <TopBar state={state}/>
        <div key={page} style={{animation:'fade-in .25s ease-out'}}>
          {PAGE_MAP[page]||<HomePage state={state}/>}
        </div>
        <BottomNav page={page} navigate={state.navigate}/>
      </div>
      <Toasts toasts={toasts}/>
    </>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
