<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Porte Boshi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.2/confetti.browser.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}

:root{
  --bg:#0a0a0a;--surface:#111111;--card:#181818;--border:#252525;
  --primary:#e8472a;--primary-light:#ff6649;--secondary:#c93a20;
  --accent:#f5c842;--text:#f0ede8;--muted:#6b6760;--faint:#2a2826;
  --success:#4caf7d;--warn:#f5c842;--danger:#e8472a;
  --glow:rgba(232,71,42,.22);--glow2:rgba(232,71,42,.08);
  --r:12px;--r-lg:16px;--r-xl:20px;
  --ff:'Outfit',sans-serif;--ff-serif:'Cormorant Garamond',serif;
  --ff-bn:'Hind Siliguri',sans-serif;--ff-mono:'JetBrains Mono',monospace;
  --transition:.22s cubic-bezier(.22,1,.36,1);
  --shadow:0 4px 24px rgba(0,0,0,.6);
  --shadow-glow:0 0 40px var(--glow);
}

/* ─── RESET & BASE ─────────────────────────────── */
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--ff);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;cursor:none}
body.fs-small{zoom:.88}
body.fs-large{zoom:1.13}

/* ─── CUSTOM CURSOR (hide on touch) ─────────────── */
@media(hover:hover){
  #cursor{position:fixed;width:12px;height:12px;background:var(--primary);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .15s,height .15s,background .15s;mix-blend-mode:difference}
  #cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid var(--primary);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .08s;opacity:.5}
  body:active #cursor{width:8px;height:8px}
}

/* ─── SCROLLBAR ────────────────────────────────── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:linear-gradient(to bottom,var(--primary),var(--accent));border-radius:99px}
::selection{background:var(--primary);color:#fff}
input,select,textarea,button{font-family:inherit;font-size:inherit}

/* ─── GRAIN OVERLAY ────────────────────────────── */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:128px}

/* ─── AMBIENT BACKGROUND ───────────────────────── */
#canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.12}
.bg-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);animation:orb-drift 18s ease-in-out infinite;opacity:.18}
.bg-orb-1{width:400px;height:400px;background:var(--primary);top:-100px;left:-100px;animation-delay:0s}
.bg-orb-2{width:350px;height:350px;background:var(--accent);bottom:-80px;right:-80px;animation-delay:-6s}
.bg-orb-3{width:300px;height:300px;background:var(--secondary);top:40%;left:60%;animation-delay:-12s;opacity:.1}
@keyframes orb-drift{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(30px,-20px) scale(1.05)}
  66%{transform:translate(-20px,30px) scale(.95)}
}

/* ─── LAYOUT ───────────────────────────────────── */
.page{max-width:100%;margin:0 auto;padding:64px 16px 100px;min-height:100vh;position:relative;z-index:1}

/* ─── GLASSMORPHISM CARD ───────────────────────── */
.card{
  background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.01) 100%);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.07);
  border-radius:var(--r-lg);padding:18px;
  position:relative;overflow:hidden;
  box-shadow:0 4px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);
  transition:border-color var(--transition),box-shadow var(--transition),transform var(--transition);
}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 60%);pointer-events:none;border-radius:inherit}
.card:hover{border-color:rgba(255,255,255,.11);box-shadow:0 8px 48px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08)}

/* ─── INPUTS ───────────────────────────────────── */
.inp{
  width:100%;padding:12px 15px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;color:var(--text);font-size:14px;
  outline:none;transition:all .2s;
  backdrop-filter:blur(8px);
}
.inp:focus{
  border-color:var(--primary);
  background:rgba(255,255,255,.06);
  box-shadow:0 0 0 3px var(--glow2),0 0 20px var(--glow2);
}
.inp::placeholder{color:var(--muted)}
select.inp option{background:var(--surface)}
textarea.inp{resize:vertical;line-height:1.7}

/* ─── BUTTONS ──────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:11px 20px;border-radius:10px;font-weight:600;font-size:13px;
  border:none;cursor:pointer;white-space:nowrap;letter-spacing:.02em;
  transition:all .2s cubic-bezier(.22,1,.36,1);
  position:relative;overflow:hidden;
}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 100%);opacity:0;transition:opacity .2s;border-radius:inherit}
.btn:hover::after{opacity:1}
.btn:active{transform:scale(.96)}

.btn-p{
  background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 100%);
  color:#fff;font-weight:700;
  box-shadow:0 4px 20px var(--glow);
}
.btn-p:hover:not(:disabled){
  box-shadow:0 6px 28px var(--glow);
  transform:translateY(-1px);
}
.btn-p:active{transform:scale(.96) translateY(0)}
.btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-s{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text);backdrop-filter:blur(8px)}
.btn-s:hover{border-color:var(--primary);color:var(--primary);background:rgba(232,71,42,.06)}
.btn-g{background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--muted)}
.btn-g:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.btn-danger{background:rgba(232,71,42,.1);border:1px solid rgba(232,71,42,.3);color:var(--danger)}
.btn-danger:hover{background:rgba(232,71,42,.18)}

/* ─── LABELS ───────────────────────────────────── */
.label{display:block;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.14em}
.sec-head{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-bottom:10px}
.divider{height:1px;background:linear-gradient(to right,transparent,var(--border),transparent);margin:16px 0}

/* ─── TAGS ─────────────────────────────────────── */
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--muted);letter-spacing:.06em;backdrop-filter:blur(4px)}
.tag-p{background:rgba(232,71,42,.12);border-color:rgba(232,71,42,.28);color:var(--primary-light)}
.tag-s{background:rgba(76,175,125,.12);border-color:rgba(76,175,125,.28);color:var(--success)}
.tag-w{background:rgba(245,200,66,.12);border-color:rgba(245,200,66,.28);color:var(--warn)}
.tag-d{background:rgba(232,71,42,.12);border-color:rgba(232,71,42,.28);color:var(--danger)}
.chip{
  display:inline-flex;align-items:center;padding:7px 14px;
  border-radius:6px;font-size:12px;font-weight:600;border:1px solid;
  cursor:pointer;transition:all .18s cubic-bezier(.22,1,.36,1);
  user-select:none;white-space:nowrap;position:relative;overflow:hidden;
}
.chip::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.06);opacity:0;transition:opacity .15s}
.chip:hover::after{opacity:1}
.chip:active{transform:scale(.95)}

/* ─── BADGES ───────────────────────────────────── */
.pro-badge{
  display:inline-flex;align-items:center;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:#fff;font-size:9px;font-weight:800;padding:3px 10px;
  border-radius:4px;text-transform:uppercase;letter-spacing:.12em;
  box-shadow:0 2px 10px var(--glow);
}
.free-badge{display:inline-flex;align-items:center;background:rgba(255,255,255,.04);color:var(--muted);font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,.08)}
.streak-badge{display:flex;align-items:center;gap:4px;background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.24);border-radius:6px;padding:4px 10px}

/* ─── STATS ────────────────────────────────────── */
.stat{
  background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.01));
  border:1px solid rgba(255,255,255,.07);border-radius:var(--r-lg);
  padding:14px;position:relative;overflow:hidden;
  transition:all .22s cubic-bezier(.22,1,.36,1);
}
.stat:hover{border-color:rgba(255,255,255,.12);transform:translateY(-2px)}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,.1),transparent)}

/* ─── CHECKBOX ─────────────────────────────────── */
.check-box{
  width:22px;height:22px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  transition:all .22s cubic-bezier(.22,1,.36,1);flex-shrink:0;
  border:1.5px solid rgba(255,255,255,.15);background:transparent;cursor:pointer;
}
.check-box.done{
  background:linear-gradient(135deg,var(--success),#2d9e62);
  border-color:var(--success);
  box-shadow:0 0 12px rgba(76,175,125,.4);
}
.check-box:hover{border-color:var(--primary);box-shadow:0 0 8px var(--glow2)}
.check-box.done:hover{box-shadow:0 0 16px rgba(76,175,125,.5)}

/* ─── PROGRESS ─────────────────────────────────── */
.progress-bar{height:4px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.22,1,.36,1);position:relative}
.progress-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 2s ease-in-out infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}

/* ─── TOP BAR ──────────────────────────────────── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  max-width:100%;margin:0 auto;
  background:rgba(10,10,10,.92);
  backdrop-filter:blur(28px) saturate(1.6);-webkit-backdrop-filter:blur(28px) saturate(1.6);
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;
  padding-top:max(0px,env(safe-area-inset-top));
}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--primary),transparent);opacity:.3}
.topbar-logo{
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:700;font-size:19px;color:#fff;
  cursor:pointer;transition:all .22s cubic-bezier(.22,1,.36,1);flex-shrink:0;
  box-shadow:0 2px 16px var(--glow);
  touch-action:manipulation;
}
.topbar-logo:hover{transform:scale(1.06) rotate(-3deg);box-shadow:0 4px 24px var(--glow)}
.topbar-logo:active{transform:scale(.9)}

/* ─── BOTTOM NAV (mobile-first) ─────────────────── */
.bottomnav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  max-width:480px;margin:0 auto;
  background:rgba(10,10,10,.92);
  backdrop-filter:blur(32px) saturate(1.8);-webkit-backdrop-filter:blur(32px) saturate(1.8);
  border-top:1px solid rgba(255,255,255,.06);
  padding:8px 4px max(8px,env(safe-area-inset-bottom)) 4px;
  display:flex;align-items:center;justify-content:space-around;gap:2px;
}
.bottomnav::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--primary),transparent);opacity:.25}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 12px;margin:0 2px;border:none;background:transparent;cursor:pointer;
  transition:all .22s cubic-bezier(.22,1,.36,1);min-width:48px;min-height:48px;
  border-radius:12px;position:relative;touch-action:manipulation;
}
.nav-item.active{background:rgba(232,71,42,.12)}
.nav-item.active::before{
  content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  width:18px;height:2.5px;background:var(--primary);border-radius:99px;
  box-shadow:0 0 8px var(--primary);
  animation:nav-indicator .3s cubic-bezier(.22,1,.36,1);
}
@keyframes nav-indicator{from{width:0;opacity:0}to{width:18px;opacity:1}}
.nav-label{font-size:8.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:color .18s}
.nav-item:active{transform:scale(.92)}

/* ─── MODAL ────────────────────────────────────── */
.modal-bg{
  position:fixed;inset:0;z-index:60;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(20px) saturate(1.2);
  display:flex;align-items:flex-end;justify-content:center;
  animation:modal-bg-in .25s ease-out;
}
@keyframes modal-bg-in{from{opacity:0}to{opacity:1}}
.modal{
  width:100%;max-width:480px;
  background:linear-gradient(180deg,rgba(28,28,28,.98) 0%,rgba(18,18,18,.99) 100%);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-top-left-radius:22px;border-top-right-radius:22px;
  border:1px solid rgba(255,255,255,.08);border-bottom:none;
  max-height:88vh;display:flex;flex-direction:column;
  animation:modal-in .38s cubic-bezier(.22,1,.36,1);
  box-shadow:0 -20px 80px rgba(0,0,0,.8);
}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,.12),transparent)}
@keyframes modal-in{from{transform:translateY(100%);opacity:.5}to{transform:translateY(0);opacity:1}}
.modal-body{padding:20px 20px 0;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px 28px;background:rgba(18,18,18,.98);border-top:1px solid rgba(255,255,255,.06);flex-shrink:0}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:99px;margin:12px auto 18px}

/* ─── TOAST ────────────────────────────────────── */
.toast{
  position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:999;
  background:linear-gradient(135deg,rgba(30,30,30,.98),rgba(20,20,20,.98));
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.1);border-radius:10px;
  padding:10px 18px;font-size:13px;font-weight:600;color:var(--text);
  white-space:nowrap;animation:toast-in .38s cubic-bezier(.22,1,.36,1);
  box-shadow:0 16px 48px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.04);
  display:flex;align-items:center;gap:8px;
}
@keyframes toast-in{
  from{opacity:0;transform:translateX(-50%) translateY(-12px) scale(.92)}
  to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
}

/* ─── AI MESSAGES ──────────────────────────────── */
.msg-user{
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:#fff;border-radius:18px 18px 4px 18px;
  padding:11px 15px;font-size:14px;line-height:1.65;
  box-shadow:0 4px 20px var(--glow);
}
.msg-ai{
  background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);
  color:var(--text);border-radius:18px 18px 18px 4px;
  padding:11px 15px;font-size:14px;line-height:1.65;
}

/* ─── FLIP CARDS ───────────────────────────────── */
.flip-card{perspective:1200px;cursor:pointer}
.flip-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{
  position:absolute;inset:0;backface-visibility:hidden;
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  padding:16px;text-align:center;font-size:13px;line-height:1.65;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.flip-back{transform:rotateY(180deg)}

/* ─── THEME CARDS ──────────────────────────────── */
.theme-card{
  border-radius:14px;overflow:hidden;cursor:pointer;
  transition:all .28s cubic-bezier(.22,1,.36,1);
  border:2px solid transparent;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.theme-card:hover{transform:translateY(-3px) scale(1.01);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.theme-card.active{
  border-color:var(--primary);
  box-shadow:0 0 0 1px var(--primary),0 8px 40px var(--glow);
  transform:scale(1.02);
}

/* ─── CONFETTI BURST ───────────────────────────── */
@keyframes confetti-burst{
  0%{transform:scale(0) rotate(0deg);opacity:1}
  100%{transform:scale(1.5) rotate(720deg);opacity:0}
}

/* ─── PAGE TRANSITIONS ─────────────────────────── */
.page-enter{animation:page-in .35s cubic-bezier(.22,1,.36,1)}
@keyframes page-in{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* ─── ANIMATIONS ───────────────────────────────── */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes float-slow{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes fire{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.2) rotate(5deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spin-slow{to{transform:rotate(360deg)}}
@keyframes slide-up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes slide-up-big{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes scale-in{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes scale-in-bounce{
  0%{opacity:0;transform:scale(.7)}
  70%{transform:scale(1.05)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes bounce-in{
  0%{opacity:0;transform:scale(.65) translateX(-50%)}
  65%{transform:scale(1.04) translateX(-50%)}
  100%{opacity:1;transform:scale(1) translateX(-50%)}
}
@keyframes slide-left{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes slide-right{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 0 0 var(--glow)}
  50%{box-shadow:0 0 0 10px transparent}
}
@keyframes stagger-in{
  from{opacity:0;transform:translateY(20px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes gradient-shift{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}
@keyframes ripple{
  0%{transform:scale(0);opacity:.8}
  100%{transform:scale(3);opacity:0}
}
@keyframes heartbeat{
  0%,100%{transform:scale(1)}
  14%{transform:scale(1.15)}
  28%{transform:scale(1)}
  42%{transform:scale(1.1)}
  70%{transform:scale(1)}
}
@keyframes typing{

<script>
// ── CUSTOM CURSOR ──────────────────────────────────────────
(function(){
  const cur=document.getElementById('cursor');
  const ring=document.getElementById('cursor-ring');
  if(!cur||!ring)return;
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{
    mx=e.clientX;my=e.clientY;
    cur.style.left=mx+'px';cur.style.top=my+'px';
  });
  function animRing(){
    rx+=(mx-rx)*.12;ry+=(my-ry)*.12;
    ring.style.left=rx+'px';ring.style.top=ry+'px';
    requestAnimationFrame(animRing);
  }
  animRing();
  document.querySelectorAll('button,a,[role=button],[onclick]').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
      cur.style.width='20px';cur.style.height='20px';
      ring.style.width='50px';ring.style.height='50px';
      ring.style.opacity='.8';
    });
    el.addEventListener('mouseleave',()=>{
      cur.style.width='12px';cur.style.height='12px';
      ring.style.width='36px';ring.style.height='36px';
      ring.style.opacity='.5';
    });
  });
  // Hide on mobile
  if('ontouchstart' in window){
    cur.style.display='none';ring.style.display='none';
    document.body.style.cursor='auto';
  }
})();

// ── PARTICLE BURST ON CLICK ────────────────────────────────
document.addEventListener('click',function(e){
  if(e.target.closest('input,textarea,select'))return;
  for(let i=0;i<8;i++){
    const p=document.createElement('div');
    const colors=['#e8472a','#f5c842','#4caf7d','#ff6649','#fff'];
    const size=3+Math.random()*5;
    const angle=Math.random()*360;
    const dist=40+Math.random()*60;
    const dur=400+Math.random()*400;
    p.style.cssText=`position:fixed;width:${size}px;height:${size}px;border-radius:50%;background:${colors[i%colors.length]};pointer-events:none;z-index:9999;left:${e.clientX}px;top:${e.clientY}px;transform:translate(-50%,-50%);transition:all ${dur}ms cubic-bezier(.22,1,.36,1)`;
    document.body.appendChild(p);
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        const rad=angle*(Math.PI/180);
        p.style.left=(e.clientX+Math.cos(rad)*dist)+'px';
        p.style.top=(e.clientY+Math.sin(rad)*dist)+'px';
        p.style.opacity='0';
        p.style.transform='translate(-50%,-50%) scale(0)';
      });
    });
    setTimeout(()=>p.remove(),dur+50);
  }
});
</script>

  async adminActivateSubscription(userId){ const expires=new Date(); expires.setDate(expires.getDate()+30); const {error}=await sb.from('subscriptions').insert({id:crypto.randomUUID(),user_id:userId,activated_at:new Date().toISOString(),expires_at:expires.toISOString()}); if(error) throw error; },
  // Upload screenshot
  async uploadScreenshot(file, userId){
    const ext = file.name.split('.').pop();
    const path = `sub_proofs/${userId}_${Date.now()}.${ext}`;
    const { data, error } = await sb.storage.from('uploads').upload(path, file, {upsert:true});
    if(error) throw error;
    const { data: urlData } = sb.storage.from('uploads').getPublicUrl(path);
    return urlData.publicUrl;
  },
  // Community chat
  async getChatMessages(limit=80){ const {data}=await sb.from('community_chat').select('*').order('created_at',{ascending:false}).limit(limit); return (data||[]).reverse(); },
  async sendChatMessage(msg){ const {error}=await sb.from('community_chat').insert(msg); if(error) throw error; },
  async deleteChatMessage(id){ await sb.from('community_chat').delete().eq('id',id); },
  subscribeToChatMessages(cb){ return sb.channel('community_chat').on('postgres_changes',{event:'INSERT',schema:'public',table:'community_chat'},payload=>cb(payload.new)).subscribe(); },
};

// PARTICLES
// ══════════════════════════════════════════════
function Particles({theme}){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current; if(!c) return;
    const ctx=c.getContext('2d');
    let W=c.width=window.innerWidth, H=c.height=window.innerHeight;
    const resize=()=>{W=c.width=window.innerWidth;H=c.height=window.innerHeight};
    window.addEventListener('resize',resize);
    const toRgb=h=>{if(!h||h.length<7)return'99,102,241';const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`${r},${g},${b}`};
    const cols=[theme.primary,theme.sec,theme.accent].filter(Boolean);
    const pts=Array.from({length:50},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.28,vy:-Math.random()*.32-.07,op:Math.random()*.55+.1,life:1,dec:Math.random()*.002+.0007,col:cols[Math.floor(Math.random()*cols.length)]||'#6366f1'}));
    let raf;
    const draw=()=>{
      ctx.clearRect(0,0,W,H);
      pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.dec;if(p.life<=0||p.y<-10){p.x=Math.random()*W;p.y=H+10;p.life=1;p.vx=(Math.random()-.5)*.28;p.vy=-Math.random()*.32-.07;p.col=cols[Math.floor(Math.random()*cols.length)]||'#6366f1';}try{const rgb=toRgb(p.col.slice(0,7));ctx.save();ctx.globalAlpha=p.op*p.life;ctx.fillStyle=`rgba(${rgb},1)`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}catch(e){}});
      raf=requestAnimationFrame(draw);
    };
    draw();
    return()=>{window.removeEventListener('resize',resize);cancelAnimationFrame(raf)};
  },[theme.id]);
  return <canvas ref={ref} id="canvas"/>;
}

function Toasts({toasts}){
  return <>{toasts.map(t=>(
    <div key={t.id} className="toast" style={{borderLeft:`3px solid ${t.type==='error'?'var(--danger)':t.type==='warn'?'var(--warn)':'var(--success)'}`}}>
      <span style={{fontSize:14}}>{t.type==='error'?'✕':t.type==='warn'?'⚠':'✓'}</span>{t.msg}
    </div>
  ))}</>;
}

// GLOBAL STATE
// ══════════════════════════════════════════════
function useAppState(){
  const [page,setPage]=useState('landing');
  const [themeId,setThemeId]=useState(ls.get('pb_theme','obsidian'));
  const [lang,setLang]=useState(ls.get('pb_lang','en'));
  const [sbUser,setSbUser]=useState(null);
  const [profile,setProfileState]=useState(null);
  const [tasks,setTasks]=useState([]);
  const [notes,setNotes]=useState([]);
  const [txns,setTxns]=useState([]);
  const [sessions,setSessions]=useState([]);
  const [tickets,setTickets]=useState([]);
  const [streak,setStreak]=useState(0);
  const [lastStudy,setLastStudy]=useState(null);
  const [pomSettings,setPomSettings]=useState(ls.get('pb_pom',{focus:25,short:5,long:15,until:4}));
  const [fontSize,setFontSize]=useState(ls.get('pb_fontSize','medium'));
  const [toasts,setToasts]=useState([]);
  const [isPremium,setIsPremium]=useState(false);
  const [premiumUntil,setPremiumUntil]=useState(null);
  const [loading,setLoading]=useState(true);
  const [creditName,setCreditName]=useState('Naimur Rahman Salman');
  const [appConfig,setAppConfig]=useState({
    app_name:'Porte Boshi',
    app_tagline:"The Student's Companion",
    credit_name:'Naimur Rahman Salman',
    bkash_number:'01758-752238',
    pro_price:'50',
    pro_duration:'30',
    free_tasks:'50',
    free_notes:'50',
    free_ai_msgs:'3',
    accent_color:'#e8472a',
    announcement:'',
    landing_desc:'An AI-powered productivity suite for Bangladeshi students.',
  });

  const theme = THEMES[themeId]||THEMES.midnight;
  // isAdmin: DB flag OR hardcoded admin secret key
  // Note: only check localStorage key against ADMIN_SECRET_KEY, not just any saved key
  const isAdmin = profile?.is_admin === true ||
    profile?.secret_key === ADMIN_SECRET_KEY;
  // Admin is always PRO — but use useEffect to avoid calling setState during render
  useEffect(()=>{ if(isAdmin) setIsPremium(true); },[isAdmin]);

  // Apply theme
  useEffect(()=>{
    const th=theme;
    const r=document.documentElement.style;
    ['bg','surface','card','border','primary','text','muted','success','warn','danger','glow'].forEach(k=>{
      if(k==='primary') r.setProperty('--primary',th.primary);
      else if(k==='glow') r.setProperty('--glow',th.glow);
      else r.setProperty(`--${k}`,th[k]);
    });
    r.setProperty('--secondary',th.sec);
    r.setProperty('--accent',th.accent);
    r.setProperty('--primary-light',th.primary);
    document.body.style.background=th.bg;
    ls.set('pb_theme',themeId);
  },[themeId]);

  // Font size — apply as body zoom class so ALL elements scale
  useEffect(()=>{
    document.body.classList.remove('fs-small','fs-large');
    if(fontSize==='small') document.body.classList.add('fs-small');
    if(fontSize==='large') document.body.classList.add('fs-large');
    ls.set('pb_fontSize',fontSize);
  },[fontSize]);

  // Key-based auth — no Supabase Auth, no email, no password
  useEffect(()=>{
    const savedKey=localStorage.getItem('pb_secret_key');
    if(savedKey) initUserByKey(savedKey);
    else setLoading(false);
  },[]);

  async function initUserByKey(secretKey){
    try{
      const prof = await DB.getProfileByKey(secretKey);
      if(!prof){ localStorage.removeItem('pb_secret_key'); setLoading(false); return; }
      setSbUser({id:prof.id,email:prof.email||''});
      setProfileState(prof);
      // Load data
      const [t,n,tx,se,ti]=await Promise.all([DB.getTasks(prof.id),DB.getNotes(prof.id),DB.getTxns(prof.id),DB.getSessions(prof.id),DB.getTickets(prof.id)]);
      setTasks(t); setNotes(n); setTxns(tx); setSessions(se); setTickets(ti);
      // Check subscription
      const sub = await DB.getSubscription(prof.id);
      if(sub && new Date(sub.expires_at) > new Date()){ setIsPremium(true); setPremiumUntil(sub.expires_at); }
      // Streak — prefer DB value, fallback to localStorage
      const dbStreak = prof.streak || 0;
      const dbLastStudy = prof.last_study || null;
      const lsStreak = ls.get(`pb_streak_${prof.id}`,{count:0,last:null});
      // Use whichever is higher (handles offline sessions)
      if(dbStreak >= lsStreak.count){ setStreak(dbStreak); setLastStudy(dbLastStudy); }
      else { setStreak(lsStreak.count); setLastStudy(lsStreak.last); }
      // App config
      try{
        const cfgs=await DB.getAllConfig();
        if(cfgs.length){
          const map={};
          cfgs.forEach(c=>{ map[c.key]=c.value; });
          setAppConfig(prev=>({...prev,...map}));
          if(map.credit_name) setCreditName(map.credit_name);
          // Apply accent color if set
          if(map.accent_color){
            document.documentElement.style.setProperty('--primary',map.accent_color);
            document.documentElement.style.setProperty('--primary-light',map.accent_color);
            document.documentElement.style.setProperty('--secondary',map.accent_color);
          }
          // Apply app name to tab title
          if(map.app_name) document.title=map.app_name;
        }
      }catch(e){}
    }catch(e){ console.warn('DB init error',e); }
    setLoading(false);
    if(page==='landing'||page==='auth') navigate('home');
  }

  function toast(msg,type='success'){ const id=Date.now(); setToasts(p=>[...p,{id,msg,type}]); setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),3000); }
  function navigate(p){
    setPage(p);
    window.scrollTo({top:0,behavior:'smooth'});
    // Trigger page animation
    setTimeout(()=>{
      const pg=document.querySelector('.page');
      if(pg){pg.style.animation='none';void pg.offsetWidth;pg.style.animation='page-in .35s cubic-bezier(.22,1,.36,1)';}
    },10);
  }

  // Auth
  function generateSecretKey(){
    // Generate a memorable key: pb_xxxx_xxxx_xxxx (letters + numbers)
    const chars='abcdefghjkmnpqrstuvwxyz23456789';
    const seg=()=>Array.from({length:5},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
    return `pb_${seg()}_${seg()}_${seg()}`;
  }

  async function createAccount(name,grade){
    // Generate unique key — retry on collision (astronomically unlikely)
    let secretKey,attempts=0;
    while(attempts<5){
      secretKey=generateSecretKey();
      const existing=await DB.getProfileByKey(secretKey);
      if(!existing) break;
      attempts++;
    }
    const id=crypto.randomUUID();
    const prof={
      id,
      secret_key:secretKey,
      name:name||'Scholar',
      grade:grade||'',
      bio:'',
      streak:0,
      last_study:null,
      created_at:new Date().toISOString(),
      is_admin:false
    };
    await DB.createProfileWithKey(prof);
    // Save key locally
    localStorage.setItem('pb_secret_key',secretKey);
    setSbUser({id,email:''});
    setProfileState(prof);
    // Init empty data
    setTasks([]); setNotes([]); setTxns([]); setSessions([]); setTickets([]);
    navigate('home');
    return secretKey;
  }

  async function loginWithKey(secretKey){
    const trimmed=secretKey.trim();
    if(!trimmed) throw new Error('Paste your secret key');

    // Admin hardcoded key — auto create or fetch admin profile
    if(trimmed===ADMIN_SECRET_KEY){
      let prof=await DB.getProfileByKey(trimmed);
      if(!prof){
        const id=crypto.randomUUID();
        prof={id,secret_key:trimmed,name:'Admin',grade:'',bio:'',streak:0,last_study:null,is_admin:true,created_at:new Date().toISOString()};
        await DB.createProfileWithKey(prof);
      }
      if(!prof.is_admin){
        await DB.upsertProfile({...prof,is_admin:true});
        prof={...prof,is_admin:true};
      }
      localStorage.setItem('pb_secret_key',trimmed);
      setSbUser({id:prof.id,email:''});
      setProfileState(prof);
      const [t,n,tx,se,ti]=await Promise.all([DB.getTasks(prof.id),DB.getNotes(prof.id),DB.getTxns(prof.id),DB.getSessions(prof.id),DB.getTickets(prof.id)]);
      setTasks(t); setNotes(n); setTxns(tx); setSessions(se); setTickets(ti);
      navigate('home');
      return;
    }

    const prof=await DB.getProfileByKey(trimmed);
    if(!prof) throw new Error('Key not found — check and try again');
    localStorage.setItem('pb_secret_key',trimmed);
    setSbUser({id:prof.id,email:prof.email||''});
    setProfileState(prof);
    const [t,n,tx,se,ti]=await Promise.all([DB.getTasks(prof.id),DB.getNotes(prof.id),DB.getTxns(prof.id),DB.getSessions(prof.id),DB.getTickets(prof.id)]);
    setTasks(t); setNotes(n); setTxns(tx); setSessions(se); setTickets(ti);
    const sub=await DB.getSubscription(prof.id);
    if(sub&&new Date(sub.expires_at)>new Date()){setIsPremium(true);setPremiumUntil(sub.expires_at);}
    navigate('home');
  }

  async function signOut(){
    localStorage.removeItem('pb_secret_key');
    setSbUser(null); setProfileState(null); setTasks([]); setNotes([]); setTxns([]); setSessions([]); navigate('landing');
  }

  // Profile
  async function updateProfile(upd){
    const {is_admin,...safeUpd}=upd; // never allow frontend to change is_admin
    const updated={...profile,...safeUpd};
    setProfileState(updated);
    await DB.upsertProfile(updated);
  }

  // Tasks
  async function addTask(task){ const full={...task,user_id:sbUser.id,created_at:new Date().toISOString()}; setTasks(p=>[full,...p]); await DB.addTask(full); }
  async function updateTask(id,upd){ setTasks(p=>p.map(t=>t.id===id?{...t,...upd}:t)); await DB.updateTask(id,upd); }
  async function deleteTask(id){ setTasks(p=>p.filter(t=>t.id!==id)); await DB.deleteTask(id); }

  // Notes
  async function addNote(note){ const full={...note,user_id:sbUser.id,created_at:new Date().toISOString()}; setNotes(p=>[full,...p]); await DB.addNote(full); }
  async function updateNote(id,upd){ setNotes(p=>p.map(n=>n.id===id?{...n,...upd}:n)); await DB.updateNote(id,upd); }
  async function deleteNote(id){ setNotes(p=>p.filter(n=>n.id!==id)); await DB.deleteNote(id); }

  // Transactions
  async function addTxn(txn){ const full={...txn,user_id:sbUser.id,created_at:new Date().toISOString()}; setTxns(p=>[full,...p]); await DB.addTxn(full); }
  async function deleteTxn(id){ setTxns(p=>p.filter(t=>t.id!==id)); await DB.deleteTxn(id); }

  // Sessions
  async function addSession(s){ const full={...s,user_id:sbUser.id,created_at:new Date().toISOString()}; setSessions(p=>[full,...p]); await DB.addSession(full); }

  // Streak — syncs to Supabase so it persists across devices
  async function updateStreak(){
    const today=new Date().toDateString(); const yesterday=new Date(Date.now()-86400000).toDateString();
    if(lastStudy===today) return;
    const ns=lastStudy===yesterday?streak+1:1;
    const todayISO=new Date().toISOString().split('T')[0];
    setStreak(ns); setLastStudy(today);
    ls.set(`pb_streak_${sbUser?.id}`,{count:ns,last:today});
    // Persist to DB (fire and forget)
    try{ await DB.upsertProfile({...profile,streak:ns,last_study:todayISO}); }catch(e){ console.warn('Streak sync failed',e); }
  }

  // Tickets
  async function addTicket(t){ const full={...t,user_id:sbUser.id,created_at:new Date().toISOString()}; setTickets(p=>[full,...p]); await DB.addTicket(full); }
  async function updateTicket(id,upd){ setTickets(p=>p.map(t=>t.id===id?{...t,...upd}:t)); await DB.updateTicket(id,upd); }

  // Plan gate
  function canAddTask(){ return isPremium || tasks.length < parseInt(appConfig.free_tasks||50); }
  function canAddNote(){ return isPremium || notes.length < parseInt(appConfig.free_notes||50); }
  function canUseTheme(id){ return isPremium || FREE_THEMES.includes(id); }

  return {
    page,navigate,theme,themeId,setThemeId,lang,setLang,
    sbUser,profile,updateProfile,createAccount,loginWithKey,signOut,generateSecretKey,
    tasks,addTask,updateTask,deleteTask,
    notes,addNote,updateNote,deleteNote,
    txns,addTxn,deleteTxn,sessions,addSession,
    streak,updateStreak,pomSettings,setPomSettings,
    fontSize,setFontSize,toasts,toast,
    isPremium,premiumUntil,
    canAddTask,canAddNote,canUseTheme,
    tickets,addTicket,updateTicket,
    isAdmin,loading,creditName,setCreditName,appConfig,setAppConfig,
  };
}

function PomodoroPage({state}){
  const {addSession,themeId,toast,profile}=state;
  const theme=THEMES[themeId]||THEMES.obsidian;

  const [mode,setMode]=useState('focus');
  const [running,setRunning]=useState(false);
  const [durations,setDurations]=useState({focus:25,short:5,long:15});
  const [timeLeft,setTimeLeft]=useState(25*60);
  const [sessDone,setSessDone]=useState(0);
  const [totalMins,setTotalMins]=useState(0);
  const [showSet,setShowSet]=useState(false);

  const MODE_COLORS={focus:'var(--primary)',short:'var(--success)',long:'var(--accent)'};
  const MODE_LABELS={focus:'Focus',short:'Short Break',long:'Long Break'};
  const total=durations[mode]*60;
  const progress=1-timeLeft/total;

  // SVG ring
  const R=90,CIRC=2*Math.PI*R;
  const strokeDash=CIRC*(1-progress);

  const intervalRef=useRef(null);
  const glowRef=useRef(null);

  useEffect(()=>{
    if(running){
      intervalRef.current=setInterval(()=>{
        setTimeLeft(t=>{
          if(t<=1){
            clearInterval(intervalRef.current);
            handleComplete();
            return 0;
          }
          return t-1;
        });
      },1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return()=>clearInterval(intervalRef.current);
  },[running,mode]);

  async function handleComplete(){
    setRunning(false);
    if(mode==='focus'){
      const dur=durations.focus;
      setSessDone(s=>s+1);
      setTotalMins(t=>t+dur);
      await addSession(dur);
      if(window.confetti) window.confetti({particleCount:60,spread:80,origin:{y:.7},colors:[theme.primary,theme.accent,theme.success]});
      toast('🎉 Session complete! +'+dur+' minutes','success');
    } else {
      toast('Break over! Time to focus 💪');
    }
    setTimeLeft(durations[mode]*60);
  }

  const toggle=()=>setRunning(r=>!r);
  const reset=()=>{setRunning(false);setTimeLeft(durations[mode]*60);};
  const switchMode=m=>{setMode(m);setRunning(false);setTimeLeft(durations[m]*60);};

  const mins=String(Math.floor(timeLeft/60)).padStart(2,'0');
  const secs=String(timeLeft%60).padStart(2,'0');
  const color=MODE_COLORS[mode];

  return(
    <div className="page" style={{display:'flex',flexDirection:'column',alignItems:'center',paddingTop:20}}>

      {/* Mode selector */}
      <div className="anim-slide" style={{display:'flex',background:'rgba(255,255,255,.04)',borderRadius:999,padding:4,gap:0,border:'1px solid rgba(255,255,255,.08)',marginBottom:28,backdropFilter:'blur(12px)'}}>
        {Object.entries(MODE_LABELS).map(([k,l])=>(
          <button key={k} onClick={()=>switchMode(k)} style={{
            padding:'8px 16px',borderRadius:999,border:'none',cursor:'pointer',
            fontWeight:700,fontSize:12,transition:'all .22s cubic-bezier(.22,1,.36,1)',
            background:mode===k?MODE_COLORS[k]:'transparent',
            color:mode===k?'#fff':'var(--muted)',
            boxShadow:mode===k?`0 4px 16px ${MODE_COLORS[k]}40`:'none',
          }}>{l}</button>
        ))}
      </div>

      {/* SVG Timer Ring */}
      <div className="anim-scale" style={{position:'relative',width:200,height:200,marginBottom:28,display:'flex',alignItems:'center',justifyContent:'center'}}>
        {/* Glow */}
        {running&&<div style={{position:'absolute',inset:-20,borderRadius:'50%',background:`${theme.primary}`,opacity:.08,animation:'pulse-glow 2s ease-in-out infinite'}}/>}

        <svg width="200" height="200" style={{position:'absolute',transform:'rotate(-90deg)'}}>
          {/* Track */}
          <circle cx="100" cy="100" r={R} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="6"/>
          {/* Progress */}
          <circle cx="100" cy="100" r={R} fill="none"
            stroke={color.includes('var') ? theme.primary : color}
            strokeWidth="7"
            strokeLinecap="round"
            strokeDasharray={CIRC}
            strokeDashoffset={strokeDash}
            style={{
              transition:'stroke-dashoffset 1s linear',
              filter:`drop-shadow(0 0 8px ${theme.primary})`,
            }}
          />
        </svg>

        {/* Time display */}
        <div style={{textAlign:'center',position:'relative',zIndex:1}}>
          <div style={{
            fontFamily:"'JetBrains Mono',monospace",fontSize:42,fontWeight:700,
            color:'var(--text)',letterSpacing:-2,lineHeight:1,
            textShadow:running?`0 0 30px ${theme.primary}60`:'none',
            transition:'text-shadow .5s',
          }}>{mins}:{secs}</div>
          <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:'2px',marginTop:6}}>{MODE_LABELS[mode]}</div>
          {sessDone>0&&<div style={{fontSize:11,color:theme.primary,marginTop:6,fontWeight:600}}>{sessDone} sessions 🔥</div>}
        </div>
      </div>

      {/* Controls */}
      <div style={{width:'100%',maxWidth:320,marginBottom:20}}>

${text}`}],'Return valid JSON only.');const p=JSON.parse(r.replace(/```json|```/g,'').trim());setCards(p);setAiOut('');}
      else if(mode==='quiz'){const r=await callAI([{role:'user',content:`Create 5 MCQs. Return ONLY JSON: [{"q":"...","opts":["A","B","C","D"],"ans":0}]
${text}`}],'Return valid JSON only.');const p=JSON.parse(r.replace(/```json|```/g,'').trim());setCards(p.map(q=>({q:q.q,a:q.opts?.[q.ans]||'',opts:q.opts})));setAiOut('');}
    }catch(e){toast('AI error: '+e.message,'error');}

  const filtered=notes.filter(n=>(folder==='All'||n.folder===folder)&&(!search||n.title?.toLowerCase().includes(search.toLowerCase())||n.content?.toLowerCase().includes(search.toLowerCase())));
  if(editing) return (

      <input className="inp" placeholder="Title..." value={title} onChange={e=>setTitle(e.target.value)} style={{fontSize:16,fontWeight:700,marginBottom:8,borderLeft:`3px solid ${col}`,borderRadius:'0 8px 8px 0'}}/>
      <div style={{marginBottom:8}}>

        <select className="inp" value={nf} onChange={e=>setNf(e.target.value)} style={{marginBottom:9}}>{allFolders.filter(f=>f!=='All').map(f=><option key={f} value={f}>{f}{userFolders.includes(f)?' ✦':''}</option>)}</select>
      </div>

        <div className="label" style={{marginBottom:7}}>AI Tools {!isPremium&&<span style={{color:'var(--warn)',fontWeight:700,fontSize:9}}>· PRO only</span>}</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>

            <div style={{fontWeight:700,fontSize:12,marginBottom:3,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{n.title||'Untitled'}</div>

            <div style={{position:'absolute',bottom:7,right:9,fontSize:9,color:'var(--muted)'}}>{n.folder}</div>

}
function AiTutorPage({state}){
  const {profile,isPremium,navigate,appConfig,toast}=state;
  const SUBJS=[{id:'general',l:'General',e:'✦',col:'#6366f1'},{id:'math',l:'Math',e:'📐',col:'#a855f7'},{id:'physics',l:'Physics',e:'⚛',col:'#06b6d4'},{id:'chem',l:'Chemistry',e:'🧪',col:'#10b981'},{id:'bio',l:'Biology',e:'🔬',col:'#f59e0b'},{id:'eng',l:'English',e:'📖',col:'#ec4899'},{id:'bangla',l:'Bengali',e:'বাং',col:'#84cc16'}];
  const grade=profile?.grade||'';
  const storeKey=`pb_ai_chats_${profile?.id}`;

  // ── Chats store (array of {id, title, subject, messages, updatedAt, createdAt})
  function loadChats(){ try{ return JSON.parse(localStorage.getItem(storeKey)||'[]'); }catch{ return []; } }
  function saveChats(chats){ localStorage.setItem(storeKey,JSON.stringify(chats)); }

  const [chats,setChats]=useState(()=>loadChats());
  const [activeChatId,setActiveChatId]=useState(null); // null = inbox view
  const [inp,setInp]=useState('');
  const [loading,setLoading]=useState(false);
  const [renaming,setRenaming]=useState(null); // chatId being renamed
  const [renameVal,setRenameVal]=useState('');
  const [showNewModal,setShowNewModal]=useState(false);
  const [newTitle,setNewTitle]=useState('');
  const [newSubj,setNewSubj]=useState('general');
  const endRef=useRef(), inpRef=useRef();

  const activeChat=chats.find(c=>c.id===activeChatId)||null;
  const cur=SUBJS.find(s=>s.id===activeChat?.subject)||SUBJS[0];

  // Persist chats any time they change
  useEffect(()=>{ saveChats(chats); },[chats]);
  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); },[activeChatId, chats.find(c=>c.id===activeChatId)?.messages?.length, loading]);

  function createChat(title,subject){
    const subInfo=SUBJS.find(s=>s.id===subject)||SUBJS[0];
    const welcome=`Hi${profile?.name?' '+profile.name.split(' ')[0]:''}! I'm your ${grade?grade+' ':''}${subInfo.l} tutor.${grade?' I\'ll teach at your exact level.':''} What would you like to learn today?`;
    const chat={
      id:crypto.randomUUID(),
      title:title.trim()||`${subInfo.l} Chat`,
      subject,
      messages:[{id:0,role:'assistant',text:welcome,ts:new Date().toISOString()}],
      createdAt:new Date().toISOString(),
      updatedAt:new Date().toISOString(),
    };
    setChats(p=>[chat,...p]);
    setActiveChatId(chat.id);
    setShowNewModal(false);
    setNewTitle('');setNewSubj('general');
    setTimeout(()=>inpRef.current?.focus(),100);
  }

  function deleteChat(id){
    if(!window.confirm('Delete this chat? Messages will be lost.')) return;
    setChats(p=>p.filter(c=>c.id!==id));
    if(activeChatId===id) setActiveChatId(null);
    toast('Chat deleted');
  }

  function updateChatMessages(id,msgs){
    setChats(p=>p.map(c=>c.id===id?{...c,messages:msgs,updatedAt:new Date().toISOString()}:c));
  }

  function renameChat(id,title){
    if(!title.trim()) return;
    setChats(p=>p.map(c=>c.id===id?{...c,title:title.trim()}:c));
    setRenaming(null);
  }

  const QUICK=['Explain this concept simply','Give me 5 practice questions','What are key formulas?','Create a study plan for me','Summarize this topic'];

  async function send(text){
    if(!activeChat) return;
    const msgCount=activeChat.messages.filter(m=>m.role==='assistant').length;
    if(!isPremium&&msgCount>=parseInt(appConfig?.free_ai_msgs||3)){ navigate('subscription'); return; }
    const txt=(text||inp).trim(); if(!txt||loading) return;
    setInp('');
    const userMsg={id:Date.now(),role:'user',text:txt,ts:new Date().toISOString()};
    const newMsgs=[...activeChat.messages,userMsg];
    updateChatMessages(activeChatId,newMsgs);
    setLoading(true);
    try{
      const sys=getAiPersona(grade,cur.l);
      const history=newMsgs.slice(-14).filter(m=>m.role!=='system').map(m=>({role:m.role,content:m.text}));
      const r=await callAI(history,sys);
      const aiMsg={id:Date.now()+1,role:'assistant',text:r,ts:new Date().toISOString()};
      updateChatMessages(activeChatId,[...newMsgs,aiMsg]);
    }catch(e){
      updateChatMessages(activeChatId,[...newMsgs,{id:Date.now()+1,role:'assistant',text:'⚠ '+e.message,ts:new Date().toISOString()}]);
    }
    setLoading(false);
    inpRef.current?.focus();
  }

  function formatRelTime(iso){
    const d=new Date(iso), now=new Date();
    const diff=now-d;
    if(diff<60000) return 'just now';
    if(diff<3600000) return Math.floor(diff/60000)+'m ago';
    if(diff<86400000) return Math.floor(diff/3600000)+'h ago';
    if(diff<604800000) return Math.floor(diff/86400000)+'d ago';
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }

  // ── NEW CHAT MODAL ───────────────────────────
  if(showNewModal) return (
    <div className="page anim-fade" style={{paddingTop:80}}>
      <button onClick={()=>setShowNewModal(false)} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:12,fontWeight:600,marginBottom:20,display:'flex',alignItems:'center',gap:5,padding:0}}>← Back</button>

      {chats.length===0&&(

          <button onClick={()=>setShowNewModal(true)} className="btn btn-p" style={{padding:'12px 28px',fontSize:14,borderRadius:10}}>✦ Start Your First Chat</button>
        </div>

      {/* Subject filter strip */}
      {chats.length>0&&(
        <div style={{display:'flex',gap:5,marginBottom:14,overflowX:'auto',paddingBottom:3}}>
          {['all',...SUBJS.map(s=>s.id)].map(sid=>{

                onMouseEnter={e=>{e.currentTarget.style.borderColor=info?.col||'var(--primary)';e.currentTarget.style.color=info?.col||'var(--primary)';}}

                {sid==='all'?'All ':info?.e+' '}{sid==='all'?`(${count})`:info?.l}

                <button onClick={()=>renameChat(chat.id,renameVal)} className="btn btn-p" style={{padding:'7px 13px',fontSize:12}}>✓</button>

      <div style={{padding:'9px 14px',background:'rgba(10,10,10,.92)',backdropFilter:'blur(20px)',borderBottom:'1px solid var(--border)',flexShrink:0,display:'flex',alignItems:'center',gap:10}}>
        <button onClick={()=>setActiveChatId(null)} style={{width:30,height:30,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:13,color:'var(--muted)',flexShrink:0}}>←</button>
        <div style={{width:28,height:28,borderRadius:7,background:`${cur.col}18`,border:`1px solid ${cur.col}30`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>{cur.e}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{activeChat.title}</div>
          <div style={{fontSize:10,color:'var(--muted)'}}>{cur.l}{grade&&` · ${grade}`} · {msgs.filter(m=>m.role==='user').length} messages</div>
        </div>
        <button onClick={()=>{setRenaming(activeChatId);setRenameVal(activeChat.title);setActiveChatId(null);}} style={{padding:'5px 9px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,color:'var(--muted)',fontSize:10,fontWeight:700,cursor:'pointer',flexShrink:0}}>✏</button>
      </div>

      {!isPremium&&msgs.filter(m=>m.role==='assistant').length>=parseInt(appConfig?.free_ai_msgs||3)&&(
        <div style={{margin:'8px 14px 0',padding:'8px 12px',background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.28)',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div style={{fontSize:11,color:'var(--warn)'}}>⭐ Reply limit reached. <button onClick={()=>navigate('subscription')} style={{background:'none',border:'none',color:'var(--warn)',cursor:'pointer',fontSize:11,fontWeight:700}}>Upgrade →</button></div>
        </div>
      )}

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'10px 14px 4px',display:'flex',flexDirection:'column',gap:8}}>
        {msgs.length<=1&&(
          <div style={{background:`${cur.col}0a`,border:`1px solid ${cur.col}1c`,borderRadius:11,padding:12,marginBottom:3}}>
            <div style={{fontSize:11,color:'var(--muted)',marginBottom:7,textTransform:'uppercase',letterSpacing:'.06em'}}>💡 Quick prompts</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {QUICK.map(q=><button key={q} onClick={()=>send(q)} className="chip" style={{borderColor:'var(--border)',background:'var(--surface)',color:'var(--text)',fontSize:11}}>{q}</button>)}
            </div>
          </div>
        )}
        {msgs.map((m,i)=>{
          const showTime=i===0||(new Date(m.ts)-new Date(msgs[i-1].ts))>300000;
          return (
            <div key={m.id}>
              {showTime&&i>0&&<div style={{textAlign:'center',fontSize:9,color:'var(--muted)',margin:'4px 0 8px',fontWeight:600}}>{new Date(m.ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})}</div>}
              <div style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start',gap:6}}>
                {m.role==='assistant'&&<div style={{width:28,height:28,flexShrink:0,borderRadius:8,background:`${cur.col}1e`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}}>{cur.e}</div>}
                <div style={{maxWidth:'83%',fontSize:13,lineHeight:1.75,whiteSpace:'pre-wrap',wordBreak:'break-word'}} className={m.role==='user'?'msg-user':'msg-ai'}>{m.text}</div>
              </div>
            </div>
          );
        })}
        {loading&&(
          <div style={{display:'flex',gap:6,alignItems:'flex-start'}}>
            <div style={{width:28,height:28,borderRadius:8,background:`${cur.col}1e`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}}>{cur.e}</div>
            <div className="msg-ai" style={{display:'flex',gap:4,alignItems:'center',padding:'10px 13px'}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:cur.col,animation:`typing .6s ease-in-out ${i*.15}s infinite`}}/>)}
            </div>
          </div>
        )}
        <div ref={endRef}/>
      </div>

      {/* Input */}
      <div style={{padding:'7px 14px 10px',flexShrink:0,borderTop:'1px solid var(--border)',background:'rgba(10,10,10,.8)',backdropFilter:'blur(16px)'}}>
        <div style={{display:'flex',gap:7,alignItems:'flex-end',background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:13,padding:'6px 6px 6px 13px',transition:'border-color .2s'}} onFocusCapture={e=>e.currentTarget.style.borderColor=cur.col} onBlurCapture={e=>e.currentTarget.style.borderColor='var(--border)'}>
          <textarea ref={inpRef} value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} placeholder={`Ask ${cur.l} tutor...`} rows={1} style={{flex:1,background:'none',border:'none',outline:'none',color:'var(--text)',fontSize:14,lineHeight:1.5,resize:'none',fontFamily:'inherit',maxHeight:90,overflowY:'auto'}}/>
          <button onClick={()=>send()} disabled={!inp.trim()||loading} style={{width:36,height:36,background:inp.trim()&&!loading?cur.col:'var(--border)',border:'none',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',cursor:inp.trim()&&!loading?'pointer':'not-allowed',color:'#fff',fontSize:15,boxShadow:inp.trim()&&!loading?`0 3px 12px ${cur.col}48`:'none',transition:'all .18s'}}>➤</button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
// COMMUNITY CHAT PAGE
// ══════════════════════════════════════════════
function CommunityChatPage({state}){
  const {profile,isAdmin,toast}=state;
  const [msgs,setMsgs]=useState([]);
  const [inp,setInp]=useState('');
  const [loading,setLoading]=useState(true);
  const [sending,setSending]=useState(false);
  const [onlineCount,setOnlineCount]=useState(1);
  const endRef=useRef(), inpRef=useRef();
  const COLORS=['#e8472a','#7c6aff','#06b6d4','#10b981','#f59e0b','#ec4899','#84cc16','#ff6b00'];
  function userColor(name){ let h=0; for(let c of (name||'?')) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }

  useEffect(()=>{
    loadMessages();
    let channel;
    try{
      channel=DB.subscribeToChatMessages(newMsg=>{
        setMsgs(p=>{ if(p.find(m=>m.id===newMsg.id)) return p; return [...p,newMsg]; });
        setTimeout(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),80);
      });
    }catch(e){}
    const t=setInterval(()=>setOnlineCount(Math.floor(Math.random()*4)+1),12000);
    return ()=>{ try{ channel?.unsubscribe(); }catch(e){} clearInterval(t); };
  },[]);

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);

  async function loadMessages(){
    setLoading(true);
    try{ const data=await DB.getChatMessages(); setMsgs(data); }
    catch(e){ toast('Could not load chat — check community_chat table exists','error'); }
    setLoading(false);
  }

  async function send(){
    const txt=inp.trim(); if(!txt||sending) return;
    if(txt.length>500){ toast('Message too long (max 500 chars)','warn'); return; }
    setInp('');
    setSending(true);
    try{
      await DB.sendChatMessage({id:crypto.randomUUID(),user_id:profile?.id||'anon',user_name:profile?.name||'Scholar',text:txt,created_at:new Date().toISOString()});
    }catch(e){ toast('Failed to send: '+e.message,'error'); setInp(txt); }
    setSending(false);
    inpRef.current?.focus();
  }

  async function deleteMsg(id){
    try{ await DB.deleteChatMessage(id); setMsgs(p=>p.filter(m=>m.id!==id)); toast('Deleted'); }
    catch(e){ toast('Failed','error'); }
  }

  function formatTime(iso){ const d=new Date(iso); return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}); }
  function formatDate(iso){ const d=new Date(iso); const today=new Date(); const yesterday=new Date(today); yesterday.setDate(today.getDate()-1); if(d.toDateString()===today.toDateString()) return 'Today'; if(d.toDateString()===yesterday.toDateString()) return 'Yesterday'; return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }

  const grouped=[];
  msgs.forEach((m,i)=>{
    const d=formatDate(m.created_at);
    if(i===0||formatDate(msgs[i-1].created_at)!==d) grouped.push({type:'date',label:d,key:'d'+i});
    grouped.push({type:'msg',...m});
  });

  return (
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 120px)',overflow:'hidden',position:'relative',marginTop:60}}>
      {/* Chat header */}
      <div style={{padding:'10px 16px 9px',background:'rgba(10,10,10,.9)',backdropFilter:'blur(16px)',borderBottom:'1px solid var(--border)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontWeight:700,fontSize:14}}>💬 Student Lounge</div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:1,display:'flex',alignItems:'center',gap:5}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'var(--success)',display:'inline-block',boxShadow:'0 0 6px var(--success)'}}/>
            {onlineCount} online · public · be respectful 🙏
          </div>
        </div>
        <button onClick={loadMessages} style={{width:30,height:30,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:12,color:'var(--muted)'}}>↺</button>
      </div>

      {/* Admin SQL hint */}
      {isAdmin&&msgs.length===0&&!loading&&(
        <div style={{margin:'10px 16px',padding:'10px 13px',background:'rgba(245,200,66,.06)',border:'1px solid rgba(245,200,66,.2)',borderRadius:9,fontSize:10,color:'var(--warn)',lineHeight:1.9}}>
          ⚠️ Create the <strong>community_chat</strong> table in Supabase SQL editor:<br/>
          <code style={{fontSize:9,display:'block',marginTop:4,background:'rgba(0,0,0,.4)',padding:'5px 8px',borderRadius:5,whiteSpace:'pre-wrap',color:'#a5f3fc'}}>
{`CREATE TABLE community_chat (
  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
  user_id text, user_name text, text text,
  created_at timestamptz DEFAULT now()
);
ALTER TABLE community_chat ENABLE ROW LEVEL SECURITY;
CREATE POLICY "read_all" ON community_chat FOR SELECT USING (true);
CREATE POLICY "insert_all" ON community_chat FOR INSERT WITH CHECK (true);
CREATE POLICY "delete_all" ON community_chat FOR DELETE USING (true);`}
          </code>
        </div>
      )}

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'8px 16px 4px',display:'flex',flexDirection:'column',gap:0}}>
        {loading&&<div style={{textAlign:'center',padding:'40px 0',color:'var(--muted)'}}>
          <div style={{display:'flex',gap:5,justifyContent:'center'}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:'50%',background:'var(--primary)',animation:`typing .6s ease-in-out ${i*.18}s infinite`}}/>)}</div>
          <div style={{fontSize:12,marginTop:10}}>Loading messages...</div>
        </div>}

        {grouped.map((item,i)=>{
          if(item.type==='date') return (
            <div key={item.key} style={{textAlign:'center',margin:'10px 0 6px',display:'flex',alignItems:'center',gap:8}}>
              <div style={{flex:1,height:1,background:'var(--border)'}}/>
              <span style={{fontSize:10,color:'var(--muted)',fontWeight:600}}>{item.label}</span>
              <div style={{flex:1,height:1,background:'var(--border)'}}/>
            </div>
          );
          const isMe=item.user_id===profile?.id;
          const col=userColor(item.user_name);
          const showAvatar=!isMe&&(i<=1||grouped[i-1]?.type==='date'||grouped[i-1]?.user_id!==item.user_id);
          const showName=showAvatar;
          return (
            <div key={item.id} style={{display:'flex',flexDirection:'column',alignItems:isMe?'flex-end':'flex-start',marginBottom:3,animation:'slide-up .22s cubic-bezier(.22,1,.36,1)'}}>
              {showName&&!isMe&&<div style={{fontSize:10,fontWeight:700,color:col,marginBottom:2,paddingLeft:30}}>{item.user_name||'Scholar'}</div>}
              <div style={{display:'flex',alignItems:'flex-end',gap:5,maxWidth:'82%',flexDirection:isMe?'row-reverse':'row'}}>
                {!isMe&&(showAvatar
                  ?<div style={{width:22,height:22,borderRadius:6,background:col+'22',border:`1px solid ${col}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:col,flexShrink:0}}>{(item.user_name||'?')[0].toUpperCase()}</div>
                  :<div style={{width:22,flexShrink:0}}/>
                )}
                <div>
                  <div style={{
                    padding:'8px 12px',
                    borderRadius:isMe?'14px 14px 4px 14px':'4px 14px 14px 14px',
                    background:isMe?'linear-gradient(135deg,var(--primary),var(--secondary))':'rgba(255,255,255,.06)',
                    border:isMe?'none':'1px solid rgba(255,255,255,.08)',
                    color:isMe?'#fff':'var(--text)',fontSize:13,lineHeight:1.55,
                    boxShadow:isMe?'0 3px 14px var(--glow)':'none',
                    wordBreak:'break-word',
                  }}>{item.text}</div>
                  <div style={{fontSize:9,color:'var(--muted)',marginTop:2,textAlign:isMe?'right':'left',paddingInline:3}}>
                    {formatTime(item.created_at)}
                    {(isMe||isAdmin)&&<button onClick={()=>{if(window.confirm('Delete?'))deleteMsg(item.id);}} style={{marginLeft:6,background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:9,padding:0,opacity:.55}}>✕</button>}
                  </div>
                </div>
              </div>
            </div>
          );
        })}
        {msgs.length===0&&!loading&&(
          <div style={{textAlign:'center',padding:'50px 0',color:'var(--muted)'}}>
            <div style={{fontSize:36,marginBottom:10}}>💬</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:18}}>No messages yet</div>
            <div style={{fontSize:12,marginTop:6}}>Be the first to say hello!</div>
          </div>
        )}
        <div ref={endRef}/>
      </div>

      {/* Input */}
      <div style={{padding:'8px 16px 12px',flexShrink:0,borderTop:'1px solid var(--border)',background:'rgba(10,10,10,.8)',backdropFilter:'blur(16px)'}}>
        <div style={{display:'flex',gap:8,alignItems:'flex-end',background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:13,padding:'6px 6px 6px 12px',transition:'border-color .2s'}} onFocusCapture={e=>e.currentTarget.style.borderColor='var(--primary)'} onBlurCapture={e=>e.currentTarget.style.borderColor='var(--border)'}>
          <div style={{width:20,height:20,borderRadius:5,background:userColor(profile?.name)+'22',border:`1px solid ${userColor(profile?.name)}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,color:userColor(profile?.name),flexShrink:0,marginBottom:6}}>{(profile?.name||'?')[0].toUpperCase()}</div>
          <textarea ref={inpRef} value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Say something..." rows={1} style={{flex:1,background:'none',border:'none',outline:'none',color:'var(--text)',fontSize:13,lineHeight:1.5,resize:'none',fontFamily:'inherit',maxHeight:80,overflowY:'auto'}}/>
          <button onClick={send} disabled={!inp.trim()||sending} style={{width:32,height:32,background:inp.trim()&&!sending?'var(--primary)':'var(--border)',border:'none',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',cursor:inp.trim()&&!sending?'pointer':'not-allowed',color:'#fff',fontSize:14,boxShadow:inp.trim()&&!sending?'0 3px 12px var(--glow)':'none',transition:'all .18s',flexShrink:0}}>
            {sending?<span style={{animation:'spin .6s linear infinite',display:'inline-block'}}>⟳</span>:'➤'}
          </button>
        </div>
        <div style={{fontSize:9,color:'var(--muted)',marginTop:4,textAlign:'right'}}>{inp.length}/500</div>
      </div>
    </div>
  );
}

// THEMES
// ══════════════════════════════════════════════
function ThemesPage({state}){
  const {themeId,setThemeId,fontSize,setFontSize,toast,isPremium,canUseTheme,navigate}=state;

  const applyTheme=id=>{
    if(!canUseTheme(id)){toast('Upgrade to PRO to unlock this theme ✦','warn');navigate('subscription');return;}
    setThemeId(id);
    toast(THEMES[id].emoji+' '+THEMES[id].name+' applied!','success');
  };

  return (
    <div className="page page-enter">
      {/* Header */}
      <div style={{marginBottom:22}}>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:34,fontWeight:700,marginBottom:6,letterSpacing:'-0.5px'}}>Themes</h1>
        <p style={{color:'var(--muted)',fontSize:13}}>{isPremium?`All ${Object.keys(THEMES).length} themes unlocked ✦`:`${FREE_THEMES.length} free · ${Object.keys(THEMES).length-FREE_THEMES.length} PRO themes`}</p>
      </div>

      {/* Active theme hero */}
      <div className="card anim-slide" style={{marginBottom:18,borderColor:'var(--primary)',boxShadow:'0 0 30px var(--glow)',padding:'16px 18px'}}>
        <div style={{fontSize:10,fontWeight:700,color:'var(--primary)',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:10}}>✦ Current Theme</div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div className="anim-float" style={{fontSize:32}}>{THEMES[themeId]?.emoji}</div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700}}>{THEMES[themeId]?.name}</div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{FREE_THEMES.includes(themeId)?'Free theme':'PRO theme'}</div>
          </div>
          <div style={{display:'flex',gap:6}}>
            {['primary','accent','success','warn'].map(v=>(
              <div key={v} style={{width:14,height:14,borderRadius:'50%',background:`var(--${v})`,boxShadow:`0 0 6px var(--${v})`}}/>
            ))}
          </div>
        </div>
      </div>

      {/* Theme grid */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:11,marginBottom:22}}>
        {Object.values(THEMES).map((th,i)=>{
          const active=themeId===th.id;
          const locked=!canUseTheme(th.id);
          return (
            <div key={th.id} onClick={()=>applyTheme(th.id)}
              className={`theme-card anim-scale s${Math.min(i+1,9)}`}
              style={{
                background:`linear-gradient(160deg,${th.bg} 0%,${th.surface} 100%)`,
                border:`2px solid ${active?th.primary:'rgba(255,255,255,.07)'}`,
                boxShadow:active?`0 0 0 1px ${th.primary},0 8px 32px ${th.glow}`:'0 4px 20px rgba(0,0,0,.4)',
                borderRadius:14,overflow:'hidden',cursor:'pointer',
                transform:active?'scale(1.02)':'scale(1)',
                transition:'all .25s cubic-bezier(.22,1,.36,1)',
              }}
              onMouseEnter={e=>{if(!active){e.currentTarget.style.transform='translateY(-4px) scale(1.01)';e.currentTarget.style.boxShadow=`0 12px 40px ${th.glow}`;} }}
              onMouseLeave={e=>{if(!active){e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 4px 20px rgba(0,0,0,.4)';}}}
            >
              {/* Mini preview */}
              <div style={{padding:'10px 10px 8px',background:`linear-gradient(135deg,${th.bg},${th.surface})`}}>
                <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:7}}>
                  <div style={{width:14,height:14,borderRadius:3,background:`linear-gradient(135deg,${th.primary},${th.sec||th.primary})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,color:'#fff',fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontWeight:700}}>P</div>
                  <div style={{flex:1,height:3,background:`${th.text}18`,borderRadius:2}}/>
                  <div style={{width:18,height:6,background:`${th.primary}50`,borderRadius:2}}/>
                </div>
                {[1,2].map(n=>(
                  <div key={n} style={{background:th.card,borderRadius:5,padding:'5px 7px',marginBottom:4,border:`1px solid ${th.border}`,borderLeft:`2px solid ${n===1?th.primary:th.accent}`}}>
                    <div style={{width:`${50+n*15}%`,height:3,background:`${th.text}35`,borderRadius:99,marginBottom:3}}/>
                    <div style={{width:`${30+n*10}%`,height:2,background:`${th.muted}35`,borderRadius:99}}/>
                  </div>
                ))}
                <div style={{display:'flex',justifyContent:'space-around',marginTop:6,paddingTop:5,borderTop:`1px solid ${th.border}`}}>
                  {['⊞','≡','◎','¥','✦'].map((ic,idx)=>(
                    <div key={idx} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                      <span style={{fontSize:7,color:idx===0?th.primary:th.muted,opacity:idx===0?1:.4}}>{ic}</span>
                      {idx===0&&<div style={{width:10,height:1,background:th.primary,borderRadius:99}}/>}
                    </div>
                  ))}
                </div>
              </div>
              {/* Label */}
              <div style={{padding:'7px 9px 9px',background:`${th.surface}f0`,display:'flex',alignItems:'center',gap:7}}>
                <span style={{fontSize:13}}>{th.emoji}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:11,color:th.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{th.name}</div>
                  {locked&&<div style={{fontSize:8,color:th.warn,fontWeight:800,letterSpacing:'.06em'}}>PRO</div>}
                </div>
                {active&&<div style={{width:16,height:16,borderRadius:'50%',background:th.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'#fff',fontWeight:700,flexShrink:0,boxShadow:`0 0 8px ${th.primary}`}}>✓</div>}
                {locked&&!active&&<span style={{fontSize:11,flexShrink:0}}>🔒</span>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Font size */}
      <div className="card" style={{marginBottom:11}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:700,fontSize:18,marginBottom:12}}>🔤 Font Size</div>
        <div style={{display:'flex',gap:8}}>

        <div style={{fontSize:12,color:'var(--muted)'}}>Built with React, Supabase, and ZenMux AI</div>
      </div>

}
function AdminPage({state}){
  const {isAdmin,navigate,toast,creditName,setCreditName,appConfig,setAppConfig}=state;
  const [tab,setTab]=useState('dashboard');
  const [tickets,setTickets]=useState([]);
  const [users,setUsers]=useState([]);
  const [subReqs,setSubReqs]=useState([]);
  const [reply,setReply]=useState('');
  const [selId,setSelId]=useState(null);
  const [loading,setLoading]=useState(true);
  // Config form state — mirrors appConfig
  const [cfg,setCfg]=useState({...appConfig});
  const [cfgSaving,setCfgSaving]=useState(false);
  const [accentPreview,setAccentPreview]=useState(appConfig.accent_color||'#e8472a');
  // Spy mode
  const [spyUser,setSpyUser]=useState(null);
  const [spyData,setSpyData]=useState(null);
  const [spyLoading,setSpyLoading]=useState(false);
  const [spyTab,setSpyTab]=useState('tasks');

  useEffect(()=>{if(!isAdmin){navigate('home');return;}loadAll();},[]);
  useEffect(()=>{setCfg({...appConfig});},[appConfig]);

  async function loadAll(){
    setLoading(true);
    try{const [t,u,s]=await Promise.all([DB.getAllTickets(),DB.getAllUsers(),DB.getPaymentRequests()]);setTickets(t);setUsers(u);setSubReqs(s);}
    catch(e){toast('Load error: '+e.message,'error');}
    setLoading(false);
  }
  async function doReply(id){if(!reply.trim())return toast('Write a reply','error');await DB.updateTicket(id,{reply,status:'resolved'});setReply('');setSelId(null);toast('Reply sent ✓');loadAll();}

  async function saveConfig(){
    setCfgSaving(true);
    try{
      await DB.setConfigs(cfg);
      setAppConfig(prev=>({...prev,...cfg}));
      setCreditName(cfg.credit_name);
      // Apply accent color live
      document.documentElement.style.setProperty('--primary',cfg.accent_color);
      document.documentElement.style.setProperty('--primary-light',cfg.accent_color);
      document.documentElement.style.setProperty('--secondary',cfg.accent_color);
      document.title=cfg.app_name;
      toast('✓ Config saved — live for all users');
    }catch(e){toast('Save failed: '+e.message,'error');}
    setCfgSaving(false);
  }

  async function loadSpyData(user){
    setSpyUser(user);
    setSpyLoading(true);
    setSpyData(null);
    try{
      const [tasks,notes,txns,sessions,sub]=await Promise.all([
        DB.getTasks(user.id),
        DB.getNotes(user.id),
        DB.getTxns(user.id),
        DB.getSessions(user.id),
        DB.getSubscription(user.id).catch(()=>null),
      ]);
      setSpyData({tasks,notes,txns,sessions,sub});
    }catch(e){ toast('Failed to load user data: '+e.message,'error'); }
    setSpyLoading(false);
  }

  async function approvePayment(req){
    try{
      // Use configured duration
      const days=parseInt(appConfig.pro_duration||'30');
      const expires=new Date(); expires.setDate(expires.getDate()+days);
      await sb.from('subscriptions').insert({id:crypto.randomUUID(),user_id:req.user_id,activated_at:new Date().toISOString(),expires_at:expires.toISOString()});
      await DB.updatePaymentRequest(req.id,{status:'approved'});
      toast(`✅ PRO activated for ${req.user_name||req.user_email} (${days} days)`);loadAll();
    }catch(e){toast('Error: '+e.message,'error');}
  }
  async function rejectPayment(req){if(!window.confirm('Reject?'))return;await DB.updatePaymentRequest(req.id,{status:'rejected'});toast('Rejected');loadAll();}
  async function deleteUser(u){
    if(!window.confirm(`Delete ${u.name||u.id}? This removes ALL their data permanently.`))return;
    try{await DB.deleteUser(u.id);toast('User deleted');loadAll();}
    catch(e){toast('Delete failed: '+e.message,'error');}
  }
  async function toggleAdmin(u){
    await sb.from('profiles').update({is_admin:!u.is_admin}).eq('id',u.id);
    toast(u.is_admin?'Admin removed':'Admin granted');loadAll();
  }
  if(!isAdmin) return (<div className="page" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'60vh',flexDirection:'column',gap:12}}><div style={{fontSize:40}}>🛡️</div><div style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:700,fontSize:22}}>Access Restricted</div><button className="btn btn-p" onClick={()=>navigate('home')}>Go Home</button></div>);
  const pending=subReqs.filter(r=>r.status==='pending').length;
  const openTickets=tickets.filter(t=>t.status!=='resolved').length;
  const proUsers=subReqs.filter(r=>r.status==='approved').length;
  const today=new Date().toISOString().split('T')[0];
  const newToday=users.filter(u=>u.created_at?.startsWith(today)).length;
  const last7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);const ds=d.toISOString().split('T')[0];return{label:d.toLocaleDateString('en-US',{weekday:'short'}),count:users.filter(u=>u.created_at?.startsWith(ds)).length,ds};});
  const maxBar=Math.max(...last7.map(d=>d.count),1);

        <div style={{flex:1}}><div style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:700,fontSize:18}}>Admin Panel</div><div style={{fontSize:11,color:'var(--muted)'}}>Porte Boshi Management</div></div>

  const PAGE_MAP={

createRoot(document.getElementById('root')).render(<App/>);

<script>
// ── CANVAS PARTICLES ──
(function(){
  const canvas=document.getElementById('canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let W=canvas.width=window.innerWidth,H=canvas.height=window.innerHeight;
  window.addEventListener('resize',()=>{W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight});
  const particles=Array.from({length:60},()=>({
    x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,
    size:Math.random()*1.5+.5,
    opacity:Math.random()*.5+.1,
    color:['#e8472a','#f5c842','#4caf7d','#ffffff'][Math.floor(Math.random()*4)],
    life:Math.random()*100,pulse:Math.random()*Math.PI*2,
  }));
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.pulse+=.02;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      const osc=.5+Math.sin(p.pulse)*.5;
      ctx.save();
      ctx.globalAlpha=p.opacity*osc;
      ctx.fillStyle=p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size*(0.8+osc*.4),0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
    // Draw connections
    particles.forEach((p,i)=>{
      particles.slice(i+1,i+4).forEach(p2=>{
        const d=Math.hypot(p.x-p2.x,p.y-p2.y);
        if(d<80){
          ctx.save();
          ctx.globalAlpha=(.06*(1-d/80));
          ctx.strokeStyle='#ffffff';
          ctx.lineWidth=.5;
          ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
          ctx.restore();
        }
      });
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
