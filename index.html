<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{
  --bg:#07071a;--surface:#0d0d28;--card:#131330;--border:#1e1e48;
  --primary:#6366f1;--primary-light:#818cf8;--secondary:#a855f7;
  --accent:#06b6d4;--text:#eef0fb;--muted:#7880b0;
  --success:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --glow:rgba(99,102,241,0.28);--font:15px;--r:13px;
  --ff:'DM Sans',sans-serif;--ff-bn:'Hind Siliguri',sans-serif;
}
html{font-size:var(--font);scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--ff);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
::selection{background:var(--primary);color:#fff}
input,select,textarea,button{font-family:inherit;font-size:inherit}

.page{max-width:480px;margin:0 auto;padding:66px 16px 88px;min-height:100vh}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.inp{width:100%;padding:11px 14px;background:var(--surface);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.inp::placeholder{color:var(--muted)}
select.inp option{background:var(--surface);color:var(--text)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;
  border-radius:10px;font-weight:600;font-size:14px;border:none;transition:all .18s;cursor:pointer;white-space:nowrap}
.btn-p{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;box-shadow:0 4px 16px var(--glow)}
.btn-p:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px var(--glow)}
.btn-p:active{transform:scale(.97)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-s{background:var(--surface);border:1.5px solid var(--border);color:var(--text)}
.btn-s:hover{border-color:var(--primary)}
.btn-g{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
.btn-g:hover{color:var(--text);border-color:var(--muted)}
.btn-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);color:var(--danger)}
.label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--muted)}
.tag-p{background:rgba(99,102,241,.14);border-color:rgba(99,102,241,.32);color:#818cf8}
.tag-s{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.3);color:var(--success)}
.tag-w{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:var(--warn)}
.chip{display:inline-flex;align-items:center;padding:6px 13px;border-radius:99px;font-size:12px;font-weight:600;border:1.5px solid;cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap}
.chip:active{transform:scale(.93)}
.grad-text{background:linear-gradient(135deg,var(--primary),var(--secondary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sec-head{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:11px}
.divider{height:1px;background:var(--border);margin:16px 0}
.locked-blur{filter:blur(4px);pointer-events:none;user-select:none;opacity:.5}

@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fire{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.15) rotate(3deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slide-up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes scale-in{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes bounce-in{0%{opacity:0;transform:scale(.5)}70%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
@keyframes typing{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 var(--glow)}70%{box-shadow:0 0 0 8px transparent}100%{box-shadow:0 0 0 0 transparent}}
.anim-float{animation:float 5s ease-in-out infinite}
.anim-fire{animation:fire .5s ease-in-out infinite}
.anim-slide{animation:slide-up .35s ease-out}
.anim-fade{animation:fade-in .3s ease-out}
.anim-scale{animation:scale-in .28s ease-out}
.anim-pulse{animation:pulse-ring 2s infinite}

#canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.35}

.topbar{position:fixed;top:0;left:0;right:0;z-index:50;max-width:480px;margin:0 auto;
  background:rgba(7,7,26,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:0 16px;height:58px;
  display:flex;align-items:center;justify-content:space-between}
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:50;max-width:480px;margin:0 auto;
  background:rgba(7,7,26,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);padding:5px 0;
  display:flex;align-items:center;justify-content:space-around}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 10px;
  border:none;background:transparent;cursor:pointer;transition:all .2s;position:relative;min-width:48px}
.nav-label{font-size:10px;font-weight:600;transition:color .2s}
.nav-dot{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--primary)}

.modal-bg{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;justify-content:center}
.modal{width:100%;max-width:480px;background:var(--surface);border-top-left-radius:20px;border-top-right-radius:20px;
  padding:20px;border:1px solid var(--border);border-bottom:none;max-height:92vh;overflow-y:auto;animation:slide-up .3s ease-out}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 18px}

.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:999;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:9px 16px;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;
  animation:bounce-in .35s ease-out;box-shadow:0 8px 28px rgba(0,0,0,.4);
  display:flex;align-items:center;gap:7px}

.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px;position:relative;overflow:hidden}
.msg-user{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;border-radius:15px 15px 3px 15px;padding:10px 13px}
.msg-ai{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:15px 15px 15px 3px;padding:10px 13px}
.flip-card{perspective:1000px;cursor:pointer}
.flip-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .4s}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:13px;text-align:center;font-size:13px;line-height:1.6}
.flip-back{transform:rotateY(180deg)}
.theme-card{border-radius:13px;overflow:hidden;cursor:pointer;transition:all .2s;border:2px solid transparent}
.theme-card.active{border-color:var(--primary);box-shadow:0 0 18px var(--glow)}
.streak-badge{display:flex;align-items:center;gap:4px;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.32);border-radius:99px;padding:3px 8px}
input[type=range]{accent-color:var(--primary);width:100%}
.check-box{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;border:2px solid var(--border);background:transparent;cursor:pointer}
.check-box.done{background:var(--primary);border-color:var(--primary)}

/* Premium badge */
.pro-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;text-transform:uppercase;letter-spacing:.06em}
.free-badge{display:inline-flex;align-items:center;gap:4px;background:var(--surface);color:var(--muted);font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;border:1px solid var(--border)}

/* Lock overlay */
.lock-overlay{position:absolute;inset:0;background:rgba(7,7,26,.8);backdrop-filter:blur(3px);border-radius:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;z-index:10}

@media(max-width:380px){.page{padding:62px 12px 86px}}
@media(min-width:768px){.bottomnav{display:none}.page{padding-bottom:30px}}
</style>
</head>

// ══════════════════════════════════════════════
// GROQ AI CALL
// ══════════════════════════════════════════════
async function callAI(messages, systemPrompt) {
  const key = ls.get('pb_apikey','');
  if(!key) throw new Error('No API key. Add your Groq key in Profile settings.');
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
    body:JSON.stringify({
      model: GROQ_MODEL,
      max_tokens: 1400,
      messages:[{role:'system',content:systemPrompt},...messages],
    })
  });
  if(!res.ok){ const e=await res.json(); throw new Error(e.error?.message||'AI request failed'); }
  const d = await res.json();
  return d.choices?.[0]?.message?.content || '';
}
